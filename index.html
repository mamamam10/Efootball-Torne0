<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga eFootball</title>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0b0c0d;
            --card-bg: #16181a;
            --input-bg: #1f2226;
            --primary-neon: #00ff87;
            --accent-yellow: #ffb703;
            --text-main: #ffffff;
            --text-muted: #8a8d91;
            --border-color: #2a2d31;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-container {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 1000px;
            position: relative;
        }

        .header-container h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            font-weight: 900;
        }

        .header-container h1 span {
            color: var(--primary-neon);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 5px;
        }

        .admin-lock-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .admin-lock-btn.logged {
            border-color: var(--primary-neon);
            color: var(--primary-neon);
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .selector-torneo {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            flex-grow: 1;
            cursor: pointer;
        }

        .btn {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-edit {
            color: var(--accent-yellow);
        }

        .btn-primary {
            background-color: var(--primary-neon);
            color: #000;
            border: none;
        }

        .tabs-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            overflow-x: auto;
            width: 100%;
        }

        .tab-btn {
            background-color: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .tab-btn.active {
            background-color: var(--primary-neon);
            color: #000;
            border-color: var(--primary-neon);
        }

        .tab-content {
            display: none;
            width: 100%;
        }

        .tab-content.active {
            display: block;
        }

        /* Tablas */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background-color: #121315;
            color: var(--text-muted);
            text-align: left;
            padding: 15px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .pos-num {
            background-color: #23272a;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            margin-right: 10px;
        }

        tr:nth-child(1) .pos-num { background-color: var(--accent-yellow); color: #000; }
        tr:nth-child(2) .pos-num { background-color: #d7d7d7; color: #000; }
        tr:nth-child(3) .pos-num { background-color: #ad744c; color: #000; }

        .pts-col {
            color: var(--primary-neon);
            font-weight: bold;
        }

        /* Fixture Cards */
        .fecha-contenedor {
            margin-bottom: 30px;
        }

        .fecha-titulo {
            color: var(--primary-neon);
            font-size: 1.1rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .partido-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-left: 4px solid transparent;
        }

        .partido-card.jugado {
            border-left-color: var(--primary-neon);
        }

        .team-name {
            font-weight: bold;
            width: 35%;
        }

        .team-home { text-align: right; }
        .team-away { text-align: left; }

        .score-container {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            width: 30%;
        }

        .score-input {
            width: 45px;
            background-color: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .score-input:disabled {
            background-color: transparent;
            border-color: transparent;
        }

        .btn-save-partido {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--primary-neon);
            padding: 5px;
            display: none;
        }

        .admin-mode .btn-save-partido {
            display: inline-block;
        }

        .btn-h2h {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
            text-decoration: underline;
        }

        /* Perfiles Grid */
        .perfiles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .perfil-card-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            color: var(--text-main);
        }

        .perfil-card-btn.active {
            border-color: var(--primary-neon);
            box-shadow: 0 0 10px rgba(0, 255, 135, 0.2);
        }

        .perfil-avatar {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary-neon);
        }

        /* Vitrina */
        .vitrina-container {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-top: 20px;
        }

        .vitrina-title {
            color: var(--accent-yellow);
            text-transform: uppercase;
            font-size: 1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trofeos-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .trofeo-item {
            background: #121315;
            padding: 10px 15px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border-color);
        }

        .trofeo-badge {
            font-size: 1.3rem;
        }

        .trofeo-type {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Modales */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            width: 90%;
            max-width: 450px;
            border: 1px solid var(--border-color);
        }

        .modal-title {
            font-size: 1.2rem;
            text-transform: uppercase;
            color: var(--primary-neon);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .form-control {
            width: 100%;
            background-color: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        /* Info box inferior */
        .info-box-footer {
            background-color: #121315;
            border-left: 4px solid var(--primary-neon);
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <button class="admin-lock-btn" id="adminLockBtn" onclick="toggleAdminAuth()">🔒 Entrar como Admin</button>

    <div class="header-container">
        <h1>Liga <span>Efootball</span></h1>
        <div class="subtitle" id="globalSubtitle">Torneo Competitivo Oficial de Amigos</div>
    </div>

    <div class="main-container">
        <!-- Top Bar -->
        <div class="top-bar">
            <select class="selector-torneo" id="ligaSelector" onchange="cambiarLigaActiva()">
                <!-- Cargado dinámicamente -->
            </select>
            <button class="btn btn-edit admin-only" onclick="abrirModalRenombrar()" style="display:none;">📝</button>
            <button class="btn btn-primary admin-only" onclick="abrirModalNuevaLiga()" style="display:none;">➕ Nueva liga</button>
        </div>

        <!-- Menú Pestañas -->
        <div class="tabs-menu">
            <button class="tab-btn active" onclick="switchTab(event, 'tab-tabla')">📊 Tabla</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-fixture')">🗓️ Fixture</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-copa')">🏆 Copa</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-premios')">💰 Premios</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-premios-ind')">⭐ Premios Ind.</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-perfiles')">👤 Perfiles</button>
        </div>

        <!-- TAB TABLA -->
        <div id="tab-tabla" class="tab-content active">
            <table>
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Jugador</th>
                        <th>PJ</th>
                        <th>G</th>
                        <th>E</th>
                        <th>P</th>
                        <th>GF</th>
                        <th>GC</th>
                        <th>DG</th>
                        <th>Pts</th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                    <!-- Dinámico -->
                </tbody>
            </table>
            <div class="info-box-footer">Cargá los resultados en el Fixture. Todo se actualiza automáticamente.</div>
        </div>

        <!-- TAB FIXTURE -->
        <div id="tab-fixture" class="tab-content">
            <div id="fixture-container"><!-- Dinámico --></div>
        </div>

        <!-- TAB COPA -->
        <div id="tab-copa" class="tab-content">
            <div class="info-box-footer" id="copa-formato-desc">Formato de copa dinámico según cantidad de jugadores.</div>
            <div id="bracket-container" style="margin-top:20px;"><!-- Dinámico --></div>
        </div>

        <!-- TAB PREMIOS -->
        <div id="tab-premios" class="tab-content">
            <div id="premios-dinamicos-container"><!-- Dinámico --></div>
        </div>

        <!-- TAB PREMIOS INDIVIDUALES -->
        <div id="tab-premios-ind" class="tab-content">
            <div class="stats-grid" id="premios-ind-grid">
                <!-- Dinámico -->
            </div>
        </div>

        <!-- TAB PERFILES -->
        <div id="tab-perfiles" class="tab-content">
            <div class="perfiles-grid" id="perfiles-grid-select">
                <!-- Selectores de jugador -->
            </div>
            <div id="perfil-detalle-container">
                <!-- Detalles del seleccionado -->
            </div>
        </div>
    </div>

    <!-- MODAL RENOMBRAR -->
    <div class="modal" id="modalRenombrar">
        <div class="modal-content">
            <div class="modal-title">📝 Renombrar Torneo</div>
            <div class="form-group">
                <label>Nombre del Torneo</label>
                <input type="text" id="editNombreLigaInput" class="form-control">
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="cerrarModal('modalRenombrar')">Cancelar</button>
                <button class="btn btn-primary" onclick="guardarNombreLiga()">Guardar</button>
            </div>
        </div>
    </div>

    <!-- MODAL NUEVA LIGA -->
    <div class="modal" id="modalNuevaLiga">
        <div class="modal-content">
            <div class="modal-title">➕ Nueva Liga</div>
            <div class="form-group">
                <label>Nombre de la liga</label>
                <input type="text" id="nuevaLigaNombre" class="form-control" value="Liga 2">
            </div>
            <div class="form-group">
                <label>Monto de Inscripción por Jugador ($)</label>
                <input type="number" id="nuevaLigaPozo" class="form-control" value="1000">
            </div>
            <div class="form-group">
                <label style="margin-bottom:10px; display:block;">Seleccionar Jugadores activos:</label>
                <div id="checkboxes-jugadores" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <!-- Checkboxes dinámicos -->
                </div>
            </div>
            <div class="form-group" style="margin-top:15px;">
                <label><input type="checkbox" id="mezclarFechasAzar" checked> Mezclar orden de partidos al azar</label>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="cerrarModal('modalNuevaLiga')">Cancelar</button>
                <button class="btn btn-primary" onclick="crearNuevaLigaEstructura()">Crear</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE
        const SUPABASE_URL = "https://TU_SUPABASE_URL.supabase.co"; 
        const SUPABASE_KEY = "TU_SUPABASE_ANON_KEY";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Nombres por defecto base
        let listaJugadoresBase = ["Diego", "Nazario", "Ezequiel", "Matías", "Joseph", "Pablo"];
        let isAdmin = false;
        let ligasCached = [];
        let ligaActivaId = null;
        let partidosCached = [];
        let statsGlobales = {};
        let jugadorPerfilSeleccionado = "Diego";

        async function init() {
            await cargarLigas();
            configurarCheckboxesNuevaLiga();
        }

        function toggleAdminAuth() {
            if(!isAdmin) {
                let pass = prompt("Introducir clave de Administrador:");
                if(pass === "1234") { // Podés cambiar tu clave acá
                    isAdmin = true;
                    document.getElementById('adminLockBtn').textContent = "🔓 Modo Admin Activo";
                    document.getElementById('adminLockBtn').classList.add('logged');
                    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-flex');
                    document.body.classList.add('admin-mode');
                    renderFixture();
                } else {
                    alert("Clave incorrecta");
                }
            } else {
                isAdmin = false;
                document.getElementById('adminLockBtn').textContent = "🔒 Entrar como Admin";
                document.getElementById('adminLockBtn').classList.remove('logged');
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                document.body.classList.remove('admin-mode');
                renderFixture();
            }
        }

        async function cargarLigas() {
            let { data, error } = await _supabase.from('ligas').select('*').order('created_at', { ascending: true });
            if (error) return console.error(error);
            ligasCached = data;
            
            let selector = document.getElementById('ligaSelector');
            selector.innerHTML = '';
            
            if(ligasCached.length === 0) {
                // Crear liga inicial por defecto si está vacío
                await crearLigaInicialAutomatica();
                return;
            }

            ligasCached.forEach(l => {
                let opt = document.createElement('option');
                opt.value = l.id;
                opt.textContent = l.nombre;
                selector.appendChild(opt);
            });

            if(!ligaActivaId) ligaActivaId = ligasCached[ligasCached.length - 1].id;
            selector.value = ligaActivaId;
            
            await cargarPartidosDeLigaActiva();
        }

        async function crearLigaInicialAutomatica() {
            let { data, error } = await _supabase.from('ligas').insert([{
                nombre: "Liga 1",
                jugadores: ["Diego", "Nazario", "Ezequiel", "Matías"],
                monto_individual: 1000
            }]).select();
            if(!error) {
                ligaActivaId = data[0].id;
                await generarFixtureRoundRobin(ligaActivaId, ["Diego", "Nazario", "Ezequiel", "Matías"], false);
                await cargarLigas();
            }
        }

        async function cargarPartidosDeLigaActiva() {
            let { data, error } = await _supabase.from('resultados_partidos').select('*').eq('liga_id', ligaActivaId);
            if (error) return console.error(error);
            partidosCached = data;
            
            procesarEstadisticasYTablas();
        }

        function cambiarLigaActiva() {
            ligaActivaId = document.getElementById('ligaSelector').value;
            cargarPartidosDeLigaActiva();
        }

        function switchTab(evt, tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        function configurarCheckboxesNuevaLiga() {
            let container = document.getElementById('checkboxes-jugadores');
            container.innerHTML = '';
            listaJugadoresBase.forEach(j => {
                let lbl = document.createElement('label');
                lbl.innerHTML = `<input type="checkbox" value="${j}" checked> ${j}`;
                container.appendChild(lbl);
            });
        }

        function abrirModalNuevaLiga() { document.getElementById('modalNuevaLiga').style.display = 'flex'; }
        function abrirModalRenombrar() { 
            let curr = ligasCached.find(l => l.id == ligaActivaId);
            document.getElementById('editNombreLigaInput').value = curr.nombre;
            document.getElementById('modalRenombrar').style.display = 'flex'; 
        }
        function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }

        async function guardarNombreLiga() {
            let nuevoNom = document.getElementById('editNombreLigaInput').value;
            let { error } = await _supabase.from('ligas').update({ nombre: nuevoNom }).eq('id', ligaActivaId);
            if(!error) {
                cerrarModal('modalRenombrar');
                await cargarLigas();
            }
        }

        async function crearNuevaLigaEstructura() {
            let nombre = document.getElementById('nuevaLigaNombre').value;
            let monto = parseInt(document.getElementById('nuevaLigaPozo').value) || 0;
            let checkboxes = document.querySelectorAll('#checkboxes-jugadores input:checked');
            let jSeleccionados = Array.from(checkboxes).map(c => c.value);
            let mezclar = document.getElementById('mezclarFechasAzar').checked;

            if(jSeleccionados.length < 2) return alert("Seleccioná al menos 2 jugadores");

            let { data, error } = await _supabase.from('ligas').insert([{
                nombre: nombre,
                jugadores: jSeleccionados,
                monto_individual: monto
            }]).select();

            if(!error) {
                let nuevaLiga = data[0];
                ligaActivaId = nuevaLiga.id;
                await generarFixtureRoundRobin(ligaActivaId, jSeleccionados, mezclar);
                cerrarModal('modalNuevaLiga');
                await cargarLigas();
            }
        }

        async function generarFixtureRoundRobin(ligaId, jList, mezclar) {
            let list = [...jList];
            if(mezclar) list.sort(() => Math.random() - 0.5);
            if(list.length % 2 !== 0) list.push("BYE");

            let numJugadores = list.length;
            let numFechas = (numJugadores - 1) * 2; // Ida y vuelta
            let partidosInserts = [];
            let contadorPartidoKey = 1;

            // IDA
            for (let f = 0; f < numJugadores - 1; f++) {
                for (let i = 0; i < numJugadores / 2; i++) {
                    let home = list[i];
                    let away = list[numJugadores - 1 - i];
                    if (home !== "BYE" && away !== "BYE") {
                        partidosInserts.push({ liga_id: ligaId, partido_key: contadorPartidoKey++, fecha: f + 1, local: home, visitante: away });
                    }
                }
                list.splice(1, 0, list.pop());
            }

            // VUELTA
            for (let f = 0; f < numJugadores - 1; f++) {
                for (let i = 0; i < numJugadores / 2; i++) {
                    let home = list[numJugadores - 1 - i]; // Invertido
                    let away = list[i];
                    if (home !== "BYE" && away !== "BYE") {
                        partidosInserts.push({ liga_id: ligaId, partido_key: contadorPartidoKey++, fecha: (numJugadores - 1) + f + 1, local: home, visitante: away });
                    }
                }
                list.splice(1, 0, list.pop());
            }

            await _supabase.from('resultados_partidos').insert(partidosInserts);
        }

        function procesarEstadisticasYTablas() {
            let ligaActual = ligasCached.find(l => l.id == ligaActivaId);
            let jugActivos = ligaActual ? ligaActual.jugadores : [];
            
            statsGlobales = {};
            jugActivos.forEach(j => {
                statsGlobales[j] = { name: j, pj:0, g:0, e:0, p:0, gf:0, gc:0, dg:0, pts:0, racha: 0, derrotasGoleada: 0 };
            });

            partidosCached.forEach(p => {
                if(p.goles_local !== null && p.goles_visitante !== null) {
                    let gl = parseInt(p.goles_local);
                    let gv = parseInt(p.goles_visitante);
                    
                    if(statsGlobales[p.local] && statsGlobales[p.visitante]) {
                        statsGlobales[p.local].pj++;
                        statsGlobales[p.visitante].pj++;
                        statsGlobales[p.local].gf += gl;
                        statsGlobales[p.local].gc += gv;
                        statsGlobales[p.visitante].gf += gv;
                        statsGlobales[p.visitante].gc += gl;

                        let dif = gl - gv;
                        if(gl > gv) {
                            statsGlobales[p.local].g++;
                            statsGlobales[p.local].pts += 3;
                            statsGlobales[p.visitante].p++;
                            if(dif >= 3) statsGlobales[p.visitante].derrotasGoleada++;
                        } else if(gv > gl) {
                            statsGlobales[p.visitante].g++;
                            statsGlobales[p.visitante].pts += 3;
                            statsGlobales[p.local].p++;
                            if(Math.abs(dif) >= 3) statsGlobales[p.local].derrotasGoleada++;
                        } else {
                            statsGlobales[p.local].e++;
                            statsGlobales[p.local].pts += 1;
                            statsGlobales[p.visitante].e++;
                            statsGlobales[p.visitante].pts += 1;
                        }
                    }
                }
            });

            Object.keys(statsGlobales).forEach(j => {
                statsGlobales[j].dg = statsGlobales[j].gf - statsGlobales[j].gc;
            });

            renderTabla();
            renderFixture();
            renderCopaBracket(jugActivos);
            renderPremiosFijos(ligaActual, jugActivos);
            renderPremiosIndividualesAuto();
            renderPestañaPerfiles(jugActivos);
        }

        function renderTabla() {
            let arr = Object.values(statsGlobales).sort((a,b) => b.pts - a.pts || b.dg - a.dg || b.gf - a.gf);
            let tbody = document.getElementById('tabla-body');
            tbody.innerHTML = '';
            arr.forEach((j, i) => {
                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="pos-num">${i+1}</span></td>
                    <td style="font-weight:bold;">${j.name}</td>
                    <td>${j.pj}</td>
                    <td>${j.g}</td>
                    <td>${j.e}</td>
                    <td>${j.p}</td>
                    <td>${j.gf}</td>
                    <td>${j.gc}</td>
                    <td>${j.dg}</td>
                    <td class="pts-col">${j.pts}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderFixture() {
            let container = document.getElementById('fixture-container');
            container.innerHTML = '';

            if(partidosCached.length === 0) return;

            let maxFecha = Math.max(...partidosCached.map(p => p.fecha));
            
            for(let f=1; f<=maxFecha; f++) {
                let divFecha = document.createElement('div');
                divFecha.className = 'fecha-contenedor';
                divFecha.innerHTML = `<div class="fecha-titulo">Fecha ${f}</div>`;
                
                let partidosFecha = partidosCached.filter(p => p.fecha === f);
                partidosFecha.forEach(p => {
                    let card = document.createElement('div');
                    card.className = `partido-card ${p.goles_local !== null ? 'jugado' : ''}`;
                    
                    let gl = p.goles_local !== null ? p.goles_local : '';
                    let gv = p.goles_visitante !== null ? p.goles_visitante : '';
                    let disabledAttr = isAdmin ? '' : 'disabled';

                    card.innerHTML = `
                        <div class="team-name team-home">${p.local}</div>
                        <div class="score-container">
                            <input type="number" class="score-input" id="gl_${p.id}" value="${gl}" ${disabledAttr}>
                            <span style="color:var(--text-muted)">-</span>
                            <input type="number" class="score-input" id="gv_${p.id}" value="${gv}" ${disabledAttr}>
                            <button class="btn-save-partido" onclick="guardarPartidoEnNube(${p.id})">💾</button>
                            <button class="btn-h2h" onclick="verH2H('${p.local}', '${p.visitante}')">H2H</button>
                        </div>
                        <div class="team-name team-away">${p.visitante}</div>
                    `;
                    divFecha.appendChild(card);
                });
                container.appendChild(divFecha);
            }
        }

        async function guardarPartidoEnNube(idPartido) {
            let gl = document.getElementById(`gl_${idPartido}`).value;
            let gv = document.getElementById(`gv_${idPartido}`).value;

            if(gl === '' || gv === '') return alert("Ingresá ambos goles");

            // CORRECCIÓN DEL ERROR USANDO UPSERT BASADO EN ID ÚNICO PRIMARIO
            let { error } = await _supabase.from('resultados_partidos').upsert({
                id: idPartido,
                liga_id: ligaActivaId,
                goles_local: parseInt(gl),
                goles_visitante: parseInt(gv)
            });

            if(error) {
                alert("Error al guardar gol: " + error.message);
            } else {
                await cargarPartidosDeLigaActiva();
            }
        }

        function verH2H(j1, j2) {
            // Analiza globalmente todos los partidos guardados en memoria del torneo actual
            let c1 = 0, c2 = 0, emp = 0;
            partidosCached.forEach(p => {
                if(p.goles_local !== null && p.goles_visitante !== null) {
                    if(p.local === j1 && p.visitante === j2) {
                        if(p.goles_local > p.goles_visitante) c1++;
                        else if(p.goles_visitante > p.goles_local) c2++;
                        else emp++;
                    } else if(p.local === j2 && p.visitante === j1) {
                        if(p.goles_local > p.goles_visitante) c2++;
                        else if(p.goles_visitante > p.goles_local) c1++;
                        else emp++;
                    }
                }
            });
            alert(`Historial en esta liga:\n${j1}: ${c1} victorias\n${j2}: ${c2} victorias\nEmpates: ${emp}`);
        }

        function renderCopaBracket(jugadores) {
            let n = jugadores.length;
            let desc = document.getElementById('copa-formato-desc');
            let bCont = document.getElementById('bracket-container');
            
            // Simulación de orden clasificatorio ordenado según los puntos de la tabla viva
            let clasif = Object.values(statsGlobales).sort((a,b) => b.pts - a.pts || b.dg - a.dg).map(x => x.name);
            while(clasif.length < n) {
                clasif.push("Pendiente");
            }

            bCont.innerHTML = "";

            if(n === 4) {
                desc.textContent = "Formato Copa de 4: Semifinales directas (Ida/Vuelta) y Final única.";
                bCont.innerHTML = armarEstructuraHtmlPartido("Semifinal 1", clasif[0] || "1° Regular", clasif[3] || "4° Regular");
                bCont.innerHTML += armarEstructuraHtmlPartido("Semifinal 2", clasif[1] || "2° Regular", clasif[2] || "3° Regular");
            } else if (n === 6) {
                desc.textContent = "Formato Copa de 6: 1° y 2° pasan directo a Semis. Cuartos de final: 3° vs 6° y 4° vs 5°.";
                bCont.innerHTML = armarEstructuraHtmlPartido("Cuartos QF1", clasif[2] || "3° Regular", clasif[5] || "6° Regular");
                bCont.innerHTML += armarEstructuraHtmlPartido("Cuartos QF2", clasif[3] || "4° Regular", clasif[4] || "5° Regular");
                bCont.innerHTML += armarEstructuraHtmlPartido("Semi SF1", clasif[0] || "1° Regular", "Ganador QF2");
                bCont.innerHTML += armarEstructuraHtmlPartido("Semi SF2", clasif[1] || "2° Regular", "Ganador QF1");
            } else {
                desc.textContent = `Formato Copa Estándar para ${n} jugadores integrado en el backend.`;
                bCont.innerHTML = "<p style='color:var(--text-muted)'>Fase eliminatoria lista para iniciar tras fase regular.</p>";
            }
        }

        function armarEstructuraHtmlPartido(fase, t1, t2) {
            return `
                <div style="background:var(--card-bg); border:1px solid var(--border-color); border-radius:6px; padding:12px; margin-bottom:10px;">
                    <div style="color:var(--accent-yellow); font-size:0.75rem; font-weight:bold; margin-bottom:5px; text-transform:uppercase;">${fase}</div>
                    <div style="display:flex; justify-content:space-between; font-size:0.9rem;"><span>${t1}</span><span style="color:var(--text-muted)">-</span></div>
                    <div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-top:4px;"><span>${t2}</span><span style="color:var(--text-muted)">-</span></div>
                </div>
            `;
        }

        function renderPremiosFijos(liga, jugadores) {
            let container = document.getElementById('premios-dinamicos-container');
            let totalPozo = (liga ? liga.monto_individual : 1000) * jugadores.length;
            
            let esAmistoso = totalPozo === 0;

            let pRegular = Math.round(totalPozo * 0.30);
            let pCampeon = Math.round(totalPozo * 0.37);
            let pSub = Math.round(totalPozo * 0.20);
            let pTercero = Math.round(totalPozo * 0.13);

            let clasif = Object.values(statsGlobales).sort((a,b) => b.pts - a.pts || b.dg - a.dg);
            let lider = clasif[0] ? clasif[0].name : "Pendiente";

            container.innerHTML = `
                <div style="background:#121315; padding:15px; border-radius:6px; margin-bottom:20px; font-weight:bold; border-left: 4px solid var(--accent-yellow)">
                    Pozo Configurado: $${totalPozo} ARS ${esAmistoso ? '<span style="color:var(--primary-neon); margin-left:10px;">🎮 MODO AMISTOSO OFICIAL</span>' : ''}
                </div>
                <div class="partido-card"><span>1° de Fase Regular (30%)</span><span style="color:var(--primary-neon); font-weight:bold;">$${pRegular} (➡ ${lider})</span></div>
                <div class="partido-card"><span>Campeón de Copa (37%)</span><span style="color:var(--primary-neon); font-weight:bold;">$${pCampeon}</span></div>
                <div class="partido-card"><span>Subcampeón de Copa (20%)</span><span style="color:var(--primary-neon); font-weight:bold;">$${pSub}</span></div>
                <div class="partido-card"><span>3° Puesto Copa (13%)</span><span style="color:var(--primary-neon); font-weight:bold;">$${pTercero}</span></div>
            `;
        }

        function renderPremiosIndividualesAuto() {
            let container = document.getElementById('premios-ind-grid');
            let arr = Object.values(statsGlobales);
            
            if(arr.length === 0 || !arr[0].pj) {
                container.innerHTML = "<p style='color:var(--text-muted); padding:15px;'>Sin datos suficientes para calcular galardones individuales.</p>";
                return;
            }

            let goleador = [...arr].sort((a,b)=>b.gf - a.gf)[0];
            let solido = [...arr].sort((a,b)=>a.gc - b.gc)[0];
            let mejorDg = [...arr].sort((a,b)=>b.dg - a.dg)[0];
            let gaga = [...arr].sort((a,b)=>b.derrotasGoleada - a.derrotasGoleada)[0];

            container.innerHTML = `
                <div class="stat-box"><div class="stat-label">🎯 Goleador de Liga</div><div class="stat-value" style="font-size:1.4rem;">${goleador.name} (${goleador.gf} GF)</div></div>
                <div class="stat-box"><div class="stat-label">🛡️ Más Sólido</div><div class="stat-value" style="font-size:1.4rem;">${solido.name} (${solido.gc} GC)</div></div>
                <div class="stat-box"><div class="stat-label">💥 Mejor Diferencia</div><div class="stat-value" style="font-size:1.4rem;">${mejorDg.name} (${mejorDg.dg} DG)</div></div>
                <div class="stat-box"><div class="stat-label">💀 El más Gagá</div><div class="stat-value" style="font-size:1.4rem;">${gaga.derrotasGoleada > 0 ? gaga.name : '-'}</div></div>
            `;
        }

        function renderPestañaPerfiles(jugadores) {
            let selectCont = document.getElementById('perfiles-grid-select');
            selectCont.innerHTML = '';
            
            let iconos = ["😎", "🧠", "⚡", "🎯", "🔥", "🐉", "🔱"];

            jugadores.forEach((j, i) => {
                let btn = document.createElement('div');
                btn.className = `perfil-card-btn ${j === jugadorPerfilSeleccionado ? 'active' : ''}`;
                btn.onclick = () => { jugadorPerfilSeleccionado = j; renderPestañaPerfiles(jugadores); };
                btn.innerHTML = `
                    <div class="perfil-avatar">${iconos[i % iconos.length]}</div>
                    <div style="font-weight:bold; font-size:0.9rem;">${j}</div>
                `;
                selectCont.appendChild(btn);
            });

            let detCont = document.getElementById('perfil-detalle-container');
            let s = statsGlobales[jugadorPerfilSeleccionado] || { pj:0, g:0, e:0, p:0, gf:0, gc:0, dg:0, pts:0 };

            detCont.innerHTML = `
                <h3 style="text-transform:uppercase; border-bottom:1px solid var(--border-color); padding-bottom:8px; margin-top:20px;">👤 Trayectoria: ${jugadorPerfilSeleccionado}</h3>
                <div class="stats-grid">
                    <div class="stat-box"><div class="stat-label">Partidos Jugados</div><div class="stat-value">${s.pj}</div></div>
                    <div class="stat-box"><div class="stat-label">Efectividad Pts</div><div class="stat-value">${s.pts} PTS</div></div>
                    <div class="stat-box"><div class="stat-label">Goles a Favor</div><div class="stat-value" style="color:var(--accent-yellow);">${s.gf}</div></div>
                    <div class="stat-box"><div class="stat-label">Goles Recibidos</div><div class="stat-value" style="color:#ff4d4d;">${s.gc}</div></div>
                </div>
                
                <div class="vitrina-container">
                    <div class="vitrina-title">🏆 Vitrina de Copas y Folklore</div>
                    <div class="trofeos-list" style="margin-bottom:15px;">
                        <div class="trofeo-item"><span class="trofeo-badge">🏆</span><div><div style="font-weight:bold; font-size:0.8rem;">Trofeo de Liga</div><div class="trofeo-type">Competitivo</div></div></div>
                        <div class="trofeo-item"><span class="trofeo-badge">⚡</span><div><div style="font-weight:bold; font-size:0.8rem;">Torneo Corto</div><div class="trofeo-type">Amistoso</div></div></div>
                    </div>
                    <p style="margin:5px 0; font-size:0.85rem; color:var(--text-muted)">Finanzas del Jugador: <span style="color:var(--primary-neon); font-weight:bold;">$0 ARS Ganados</span></p>
                    <p style="margin:5px 0; font-size:0.85rem; color:var(--text-muted)">Paternidad de Folklore: <span style="color:var(--accent-yellow); font-weight:bold;">Papá de: Diego</span> | <span style="color:#ff4d4d; font-weight:bold;">Hijo de: Nazario</span></p>
                </div>
            `;
        }

        window.onload = init;
    </script>
</body>
</html>
