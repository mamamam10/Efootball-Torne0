<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga eFootball</title>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0b0c0d;
            --card-bg: #16181a;
            --input-bg: #1f2226;
            --primary-neon: #00ff87;
            --accent-yellow: #ffb703;
            --text-main: #ffffff;
            --text-muted: #8a8d91;
            --border-color: #2a2d31;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-container {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 1000px;
            position: relative;
        }

        .header-container h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            font-weight: 900;
        }

        .header-container h1 span {
            color: var(--primary-neon);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 5px;
        }

        .admin-lock-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .admin-lock-btn.logged {
            border-color: var(--primary-neon);
            color: var(--primary-neon);
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .selector-torneo {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            flex-grow: 1;
            cursor: pointer;
        }

        .btn {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 12px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--primary-neon);
            color: #000;
            border: none;
        }

        .tabs-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            overflow-x: auto;
            width: 100%;
        }

        .tab-btn {
            background-color: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .tab-btn.active {
            background-color: var(--primary-neon);
            color: #000;
            border-color: var(--primary-neon);
        }

        .tab-content {
            display: none;
            width: 100%;
        }

        .tab-content.active {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background-color: #121315;
            color: var(--text-muted);
            text-align: left;
            padding: 15px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .pos-num {
            background-color: #23272a;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            margin-right: 10px;
        }

        tr:nth-child(1) .pos-num { background-color: var(--accent-yellow); color: #000; }
        tr:nth-child(2) .pos-num { background-color: #d7d7d7; color: #000; }
        tr:nth-child(3) .pos-num { background-color: #ad744c; color: #000; }

        .pts-col {
            color: var(--primary-neon);
            font-weight: bold;
        }

        .fecha-contenedor {
            margin-bottom: 30px;
        }

        .fecha-titulo {
            color: var(--primary-neon);
            font-size: 1.1rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .partido-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-left: 4px solid transparent;
        }

        .partido-card.jugado {
            border-left-color: var(--primary-neon);
        }

        .team-name {
            font-weight: bold;
            width: 35%;
        }

        .team-home { text-align: right; }
        .team-away { text-align: left; }

        .score-container {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            width: 30%;
        }

        .score-input {
            width: 45px;
            background-color: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .score-input:disabled {
            background-color: transparent;
            border-color: transparent;
        }

        .btn-save-partido {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--primary-neon);
            padding: 5px;
            display: none;
        }

        .admin-mode .btn-save-partido {
            display: inline-block;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            width: 90%;
            max-width: 450px;
            border: 1px solid var(--border-color);
        }

        .modal-title {
            font-size: 1.2rem;
            text-transform: uppercase;
            color: var(--primary-neon);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .form-control {
            width: 100%;
            background-color: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <button class="admin-lock-btn" id="adminLockBtn" onclick="toggleAdminAuth()">🔒 Entrar como Admin</button>

    <div class="header-container">
        <h1>Liga <span>Efootball</span></h1>
        <div class="subtitle">Torneo Competitivo Oficial de Amigos</div>
    </div>

    <div class="main-container">
        <div class="top-bar">
            <select class="selector-torneo" id="ligaSelector" onchange="cambiarLigaActiva()">
                <!-- Dinámico -->
            </select>
            <button class="btn btn-primary admin-only" onclick="abrirModalNuevaLiga()" style="display:none;">➕ Nueva liga</button>
        </div>

        <div class="tabs-menu">
            <button class="tab-btn active" onclick="switchTab(event, 'tab-tabla')">📊 Tabla</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-fixture')">🗓️ Fixture</button>
        </div>

        <div id="tab-tabla" class="tab-content active">
            <table>
                <thead>
                    <tr><th>Pos</th><th>Jugador</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>DG</th><th>Pts</th></tr>
                </thead>
                <tbody id="tabla-body"></tbody>
            </table>
        </div>

        <div id="tab-fixture" class="tab-content"><div id="fixture-container"></div></div>
    </div>

    <!-- MODAL NUEVA LIGA -->
    <div class="modal" id="modalNuevaLiga">
        <div class="modal-content">
            <div class="modal-title">➕ Nueva Liga</div>
            <div class="form-group">
                <label>Nombre de la liga</label>
                <input type="text" id="nuevaLigaNombre" class="form-control" value="Torneo de Amigos">
            </div>
            <div class="form-group">
                <label style="margin-bottom:10px; display:block;">Seleccionar Jugadores activos:</label>
                <div id="checkboxes-jugadores" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; max-height:160px; overflow-y:auto; padding-right:5px;">
                    <!-- Lista Dinámica de 10 jugadores -->
                </div>
            </div>
            <div class="form-group" style="display:flex; gap:5px;">
                <input type="text" id="nuevoJugadorExtraInput" class="form-control" placeholder="Nombre nuevo amigo" style="padding:5px;">
                <button class="btn" onclick="agregarJugadorALaLista()" style="padding:5px 10px; font-size:0.85rem;">➕ Sumar</button>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="cerrarModal('modalNuevaLiga')">Cancelar</button>
                <button class="btn btn-primary" onclick="crearNuevaLigaEstructura()">Crear</button>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ EN ESTAS DOS LÍNEAS DE ABAJO ACORDATE DE PEGAR TUS DATOS DE SUPABASE (URL Y ANON KEY)
        const SUPABASE_URL = "https://TU_SUPABASE_URL.supabase.co"; 
        const SUPABASE_KEY = "TU_SUPABASE_ANON_KEY";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let listaJugadoresBase = ["Diego", "Nazario", "Ezequiel", "Matías", "Joseph", "Pablo", "Tomas", "Lucas", "Bautista", "Agustin"];
        let isAdmin = false;
        let ligasCached = [];
        let ligaActivaId = null;
        let partidosCached = [];
        let statsGlobales = {};

        async function init() {
            await cargarLigas();
            configurarCheckboxesNuevaLiga();
        }

        function toggleAdminAuth() {
            if(!isAdmin) {
                let pass = prompt("Clave Admin:");
                if(pass === "1234") { 
                    isAdmin = true;
                    document.getElementById('adminLockBtn').textContent = "🔓 Modo Admin Activo";
                    document.getElementById('adminLockBtn').classList.add('logged');
                    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-flex');
                    document.body.classList.add('admin-mode');
                    renderFixture();
                } else { alert("Incorrecta"); }
            } else {
                isAdmin = false;
                document.getElementById('adminLockBtn').textContent = "🔒 Entrar como Admin";
                document.getElementById('adminLockBtn').classList.remove('logged');
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                document.body.classList.remove('admin-mode');
                renderFixture();
            }
        }

        function configurarCheckboxesNuevaLiga() {
            let container = document.getElementById('checkboxes-jugadores');
            container.innerHTML = '';
            listaJugadoresBase.forEach(j => {
                let lbl = document.createElement('label');
                lbl.innerHTML = `<input type="checkbox" value="${j}" checked> ${j}`;
                container.appendChild(lbl);
            });
        }

        function agregarJugadorALaLista() {
            let input = document.getElementById('nuevoJugadorExtraInput');
            let nombre = input.value.trim();
            if(!nombre) return;
            if(listaJugadoresBase.includes(nombre)) return alert("Ya existe");
            listaJugadoresBase.push(nombre);
            configurarCheckboxesNuevaLiga();
            input.value = '';
        }

        async function cargarLigas() {
            let { data, error } = await _supabase.from('ligas').select('*').order('created_at', { ascending: true });
            if (error) return;
            ligasCached = data;
            let selector = document.getElementById('ligaSelector');
            selector.innerHTML = '';
            
            if(ligasCached.length === 0) return;

            ligasCached.forEach(l => {
                let opt = document.createElement('option');
                opt.value = l.id; opt.textContent = l.nombre;
                selector.appendChild(opt);
            });
            if(!ligaActivaId) ligaActivaId = ligasCached[ligasCached.length - 1].id;
            selector.value = ligaActivaId;
            await cargarPartidosDeLigaActiva();
        }

        async function cargarPartidosDeLigaActiva() {
            let { data, error } = await _supabase.from('resultados_partidos').select('*').eq('liga_id', ligaActivaId);
            if (!error) { partidosCached = data; procesarEstadisticasYTablas(); }
        }

        function cambiarLigaActiva() { ligaActivaId = document.getElementById('ligaSelector').value; cargarPartidosDeLigaActiva(); }
        
        function switchTab(evt, tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active'); evt.currentTarget.classList.add('active');
        }
        
        function abrirModalNuevaLiga() { document.getElementById('modalNuevaLiga').style.display = 'flex'; }
        function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }

        async function crearNuevaLigaEstructura() {
            let nombre = document.getElementById('nuevaLigaNombre').value;
            let checkboxes = document.querySelectorAll('#checkboxes-jugadores input:checked');
            let jSeleccionados = Array.from(checkboxes).map(c => c.value);

            if(jSeleccionados.length < 2) return alert("Seleccioná al menos 2 jugadores");

            let { data, error } = await _supabase.from('ligas').insert([{ nombre: nombre }]).select();

            if(!error) {
                ligaActivaId = data[0].id;
                await generarFixtureRoundRobin(ligaActivaId, jSeleccionados);
                cerrarModal('modalNuevaLiga');
                await cargarLigas();
            } else {
                alert("Error al crear la liga: " + error.message);
            }
        }

        async function generarFixtureRoundRobin(ligaId, jList) {
            let list = [...jList];
            if(list.length % 2 !== 0) list.push("BYE");

            let numJugadores = list.length;
            let partidosInserts = [];
            let contadorPartidoKey = 1;

            // Rondas de Ida
            for (let f = 0; f < numJugadores - 1; f++) {
                for (let i = 0; i < numJugadores / 2; i++) {
                    let home = list[i]; let away = list[numJugadores - 1 - i];
                    if (home !== "BYE" && away !== "BYE") {
                        partidosInserts.push({ liga_id: ligaId, partido_key: "P_" + (contadorPartidoKey++), fecha: f + 1, local: home, visitante: away });
                    }
                }
                list.splice(1, 0, list.pop());
            }
            // Rondas de Vuelta
            for (let f = 0; f < numJugadores - 1; f++) {
                for (let i = 0; i < numJugadores / 2; i++) {
                    let home = list[numJugadores - 1 - i]; let away = list[i];
                    if (home !== "BYE" && away !== "BYE") {
                        partidosInserts.push({ liga_id: ligaId, partido_key: "P_" + (contadorPartidoKey++), fecha: (numJugadores - 1) + f + 1, local: home, visitante: away });
                    }
                }
                list.splice(1, 0, list.pop());
            }
            await _supabase.from('resultados_partidos').insert(partidosInserts);
        }

        function procesarEstadisticasYTablas() {
            statsGlobales = {};
            
            partidosCached.forEach(p => {
                if(!statsGlobales[p.local]) statsGlobales[p.local] = { name: p.local, pj:0, g:0, e:0, p:0, gf:0, gc:0, dg:0, pts:0 };
                if(!statsGlobales[p.visitante]) statsGlobales[p.visitante] = { name: p.visitante, pj:0, g:0, e:0, p:0, gf:0, gc:0, dg:0, pts:0 };
            });

            partidosCached.forEach(p => {
                if(p.gl !== null && p.gv !== null) {
                    let gl = parseInt(p.gl); let gv = parseInt(p.gv);
                    statsGlobales[p.local].pj++; statsGlobales[p.visitante].pj++;
                    statsGlobales[p.local].gf += gl; statsGlobales[p.local].gc += gv;
                    statsGlobales[p.visitante].gf += gv; statsGlobales[p.visitante].gc += gl;
                    if(gl > gv) { statsGlobales[p.local].g++; statsGlobales[p.local].pts += 3; statsGlobales[p.visitante].p++; }
                    else if(gv > gl) { statsGlobales[p.visitante].g++; statsGlobales[p.visitante].pts += 3; statsGlobales[p.local].p++; }
                    else { statsGlobales[p.local].e++; statsGlobales[p.local].pts += 1; statsGlobales[p.visitante].e++; statsGlobales[p.visitante].pts += 1; }
                }
            });
            Object.keys(statsGlobales).forEach(j => { statsGlobales[j].dg = statsGlobales[j].gf - statsGlobales[j].gc; });
            renderTabla(); renderFixture();
        }

        function renderTabla() {
            let arr = Object.values(statsGlobales).sort((a,b) => b.pts - a.pts || b.dg - a.dg);
            let tbody = document.getElementById('tabla-body'); tbody.innerHTML = '';
            arr.forEach((j, i) => {
                tbody.innerHTML += `<tr><td><span class="pos-num">${i+1}</span></td><td><b>${j.name}</b></td><td>${j.pj}</td><td>${j.g}</td><td>${j.e}</td><td>${j.p}</td><td>${j.gf}</td><td>${j.gc}</td><td>${j.dg}</td><td class="pts-col">${j.pts}</td></tr>`;
            });
        }

        function renderFixture() {
            let container = document.getElementById('fixture-container'); container.innerHTML = '';
            if(partidosCached.length === 0) return;
            let maxFecha = Math.max(...partidosCached.map(p => p.fecha));
            for(let f=1; f<=maxFecha; f++) {
                let div = document.createElement('div'); div.className = 'fecha-contenedor';
                div.innerHTML = `<div class="fecha-titulo">Fecha ${f}</div>`;
                partidosCached.filter(p => p.fecha === f).forEach(p => {
                    let gl = p.gl !== null ? p.gl : ''; let gv = p.gv !== null ? p.gv : '';
                    let dis = isAdmin ? '' : 'disabled';
                    div.innerHTML += `<div class="partido-card ${p.gl !== null ? 'jugado' : ''}"><div class="team-name team-home">${p.local}</div><div class="score-container"><input type="number" class="score-input" id="gl_${p.id}" value="${gl}" ${dis}> - <input type="number" class="score-input" id="gv_${p.id}" value="${gv}" ${dis}><button class="btn-save-partido" onclick="guardarPartidoEnNube(${p.id})">💾</button></div><div class="team-name team-away">${p.visitante}</div></div>`;
                });
                container.appendChild(div);
            }
        }

        async function guardarPartidoEnNube(idPartido) {
            let glValue = document.getElementById(`gl_${idPartido}`).value;
            let gvValue = document.getElementById(`gv_${idPartido}`).value;
            if(glValue === '' || gvValue === '') return alert("Ingresá ambos goles");
            let { error } = await _supabase.from('resultados_partidos').upsert({ id: idPartido, liga_id: ligaActivaId, gl: parseInt(glValue), gv: parseInt(gvValue) });
            if(error) alert("Error al guardar: " + error.message); else await cargarPartidosDeLigaActiva();
        }
        window.onload = init;
    </script>
</body>
</html>
