<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Torneo Pro</title>
    <!-- Cargamos la librería oficial de Supabase para poder usarla en el script -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Mantenemos tu estética oscura con los detalles en verde flúo */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1, h2 {
            color: #00ff66;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #333;
            margin-bottom: 20px;
        }
        input, button, select {
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #00ff66;
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            cursor: pointer;
            background: #00ff66;
            color: #121212;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background: #00cc52;
            box-shadow: 0 0 10px rgba(0,255,102,0.6);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #333;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #00ff66;
            color: #121212;
        }
        tr:nth-child(even) {
            background-color: #262626;
        }
        .partido-card {
            background: #252525;
            border-left: 5px solid #00ff66;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .marcador {
            width: 50px;
            text-align: center;
        }
        .admin-badge {
            background: #ff3333;
            color: white;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <h1>🏆 Torneo eFootball Pro 🏆</h1>
    
    <!-- Sección de configuración (Solo Admin) -->
    <div class="container" id="setup-section">
        <h2>Crear Nuevo Torneo</h2>
        <input type="text" id="torneo-name" placeholder="Nombre del Torneo (ej: Liga de los Pibes)">
        <br>
        <input type="text" id="player-names" placeholder="Jugadores separados por coma (ej: Mati, Juan, Pedro)">
        <br>
        <button onclick="crearNuevoTorneo()">Generar Fixture en la Nube</button>
    </div>

    <!-- Sección del Torneo Activo -->
    <div class="container" id="torneo-section" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 id="view-torneo-name">Cargando Torneo...</h2>
            <div id="admin-indicator" class="admin-badge">MODO ADMIN ACTIVADO</div>
        </div>
        
        <button onclick="activarModoAdmin()" style="background: #333; color: #fff; border: 1px solid #fff;">🔓 Entrar como Admin</button>
        <button onclick="cargarTorneoDesdeNube()" style="background: #111; color: #00ff66;">🔄 Actualizar Datos</button>

        <h3>📊 Tabla de Posiciones</h3>
        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Jugador</th>
                    <th>PJ</th>
                    <th>PG</th>
                    <th>PE</th>
                    <th>PP</th>
                    <th>GF</th>
                    <th>GC</th>
                    <th>DG</th>
                    <th>Pts</th>
                </tr>
            </thead>
            <tbody id="tabla-body"></tbody>
        </table>

        <h3>📅 Fixture y Resultados</h3>
        <div id="fixture-container"></div>
    </div>

    <script>
        // CONFIGURACIÓN DE TU SUPABASE (Ya enlazado con tus llaves reales)
        const SUPABASE_URL = "https://zmzztkbndsuasfiuhepw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_pijw_DnJiHSxvAvAc-HLFQ_G5Y5h3AI";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Clave secreta para editar
        const CLAVE_ADMIN = "admin123";
        let esAdmin = false;
        let ligaActualId = "torneo_unico"; // ID fijo para esta prueba rápida
        let datosLiga = null;
        let golesCargados = {};

        // 1. Al cargar la página, traemos los datos actuales de la nube
        window.onload = async function() {
            await cargarTorneoDesdeNube();
        };

        // 2. Traer info desde Supabase de forma asíncrona
        async function cargarTorneoDesdeNube() {
            // Traer la configuración de la liga
            let { data: liga, error } = await _supabase
                .from('ligas_torneo')
                .select('*')
                .eq('id', ligaActualId)
                .single();

            if (error || !liga) {
                document.getElementById('setup-section').style.display = "block";
                document.getElementById('torneo-section').style.display = "none";
                return;
            }

            datosLiga = liga;
            document.getElementById('setup-section').style.display = "none";
            document.getElementById('torneo-section').style.display = "block";
            document.getElementById('view-torneo-name').innerText = liga.nombre;

            // Traer los resultados de los partidos cargados en la otra tabla
            let { data: resultados } = await _supabase
                .from('resultados_partidos')
                .select('*')
                .eq('liga_id', ligaActualId);

            golesCargados = {};
            if (resultados) {
                resultados.forEach(r => {
                    golesCargados[r.partido_key] = { gl: r.gl, gv: r.gv };
                });
            }

            renderizarTodo();
        }

        // 3. Crear el torneo y subirlo a la base de datos
        async function crearNuevoTorneo() {
            const nombre = document.getElementById('torneo-name').value.trim();
            const jugadoresRaw = document.getElementById('player-names').value;
            
            if(!nombre || !jugadoresRaw) return alert("Completá los campos perro");

            const listaJugadores = jugadoresRaw.split(',').map(j => j.trim()).filter(j => j !== "");
            if(listaJugadores.length < 2) return alert("Mínimo dos jugadores");

            // Algoritmo básico para armar el fixture de todos contra todos
            let fixture = [];
            let num = 1;
            for(let i=0; i<listaJugadores.length; i++) {
                for(let j=i+1; j<listaJugadores.length; j++) {
                    fixture.push({
                        key: `P_${num}`,
                        local: listaJugadores[i],
                        visitante: listaJugadores[j]
                    });
                    num++;
                }
            }

            // Subimos la estructura a Supabase
            const { error } = await _supabase
                .from('ligas_torneo')
                .upsert({
                    id: ligaActualId,
                    nombre: nombre,
                    jugadores: listaJugadores,
                    fixture: fixture
                });

            if(error) {
                alert("Error al subir a la nube: " + error.message);
            } else {
                esAdmin = true; // El que lo crea es admin directo
                document.getElementById('admin-indicator').style.display = "block";
                await cargarTorneoDesdeNube();
            }
        }

        // 4. Activar modo edición con contraseña
        function activarModoAdmin() {
            let pass = prompt("Ingresá la contraseña secreta de Admin:");
            if(pass === CLAVE_ADMIN) {
                esAdmin = true;
                document.getElementById('admin-indicator').style.display = "block";
                alert("¡Modo Admin activado! Ya podés guardar goles.");
                renderizarTodo();
            } else {
                alert("Contraseña incorrecta. Solo modo lectura.");
            }
        }

        // 5. Guardar un resultado individual en la base de datos
        async function guardarPartido(partidoKey) {
            if(!esAdmin) {
                alert("No tenés permiso. Poné el Modo Admin arriba con la clave.");
                return;
            }

            const gl = document.getElementById(`gl_${partidoKey}`).value;
            const gv = document.getElementById(`gv_${partidoKey}`).value;

            if(gl === "" || gv === "") return alert("Poné los goles de los dos lados");

            // Guardamos en la tabla secundaria de Supabase
            const { error } = await _supabase
                .from('resultados_partidos')
                .upsert({
                    liga_id: ligaActualId,
                    partido_key: partidoKey,
                    gl: gl,
                    gv: gv
                });

            if(error) {
                alert("Error al guardar gol: " + error.message);
            } else {
                await cargarTorneoDesdeNube(); // Recargamos para recalcular la tabla al instante
            }
        }

        // 6. Procesar los datos y dibujar las tablas y tarjetas en la pantalla
        function renderizarTodo() {
            // Inicializar estadísticas de los jugadores
            let stats = {};
            datosLiga.jugadores.forEach(j => {
                stats[j] = { name: j, pj:0, pg:0, pe:0, pp:0, gf:0, gc:0, dg:0, pts:0 };
            });

            // Dibujar fixture
            const fixtureDiv = document.getElementById('fixture-container');
            fixtureDiv.innerHTML = "";

            datosLiga.fixture.forEach(p => {
                const res = golesCargados[p.key] || { gl: "", gv: "" };
                
                // Si ya hay goles cargados en internet, sumamos a las estadísticas
                if(res.gl !== "" && res.gv !== "") {
                    let golL = parseInt(res.gl);
                    let golV = parseInt(res.gv);

                    stats[p.local].pj++;
                    stats[p.visitante].pj++;
                    stats[p.local].gf += golL;
                    stats[p.local].gc += golV;
                    stats[p.visitante].gf += golV;
                    stats[p.visitante].gc += golL;

                    if(golL > golV) {
                        stats[p.local].pg++; stats[p.local].pts += 3;
                        stats[p.visitante].pp++;
                    } else if(golV > golL) {
                        stats[p.visitante].pg++; stats[p.visitante].pts += 3;
                        stats[p.local].pp++;
                    } else {
                        stats[p.local].pe++; stats[p.local].pts += 1;
                        stats[p.visitante].pe++; stats[p.visitante].pts += 1;
                    }
                }

                // Creamos la tarjeta visual para el partido
                const card = document.createElement('div');
                card.className = "partido-card";
                card.innerHTML = `
                    <span><strong>${p.local}</strong> vs <strong>${p.visitante}</strong></span>
                    <div>
                        <input type="number" id="gl_${p.key}" class="marcador" value="${res.gl}" ${!esAdmin ? 'disabled' : ''}>
                        -
                        <input type="number" id="gv_${p.key}" class="marcador" value="${res.gv}" ${!esAdmin ? 'disabled' : ''}>
                        ${esAdmin ? `<button onclick="guardarPartido('${p.key}')" style="padding:5px; margin-left:10px;">💾</button>` : ''}
                    </div>
                `;
                fixtureDiv.appendChild(card);
            });

            // Ordenar tabla de posiciones (Puntos -> Diferencia de Gol -> Goles Favor)
            let tablaArray = Object.values(stats);
            tablaArray.forEach(j => j.dg = j.gf - j.gc);
            tablaArray.sort((a, b) => b.pts - a.pts || b.dg - a.dg || b.gf - a.gf);

            // Dibujar la tabla de posiciones en el HTML
            const tbody = document.getElementById('tabla-body');
            tbody.innerHTML = "";
            tablaArray.forEach((j, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${index + 1}</strong></td>
                    <td>${j.name}</td>
                    <td>${j.pj}</td>
                    <td>${j.pg}</td>
                    <td>${j.pe}</td>
                    <td>${j.pp}</td>
                    <td>${j.gf}</td>
                    <td>${j.gc}</td>
                    <td>${j.dg}</td>
                    <td><strong>${j.pts}</strong></td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
