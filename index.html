<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga eFootball</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--v:#00FF87;--n:#0a0a0a;--gm:#1e1e1e;--gb:#2a2a2a;--bl:#f0f0f0;--gt:#888;--am:#FFD700;--rd:#ff6b6b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--n);color:var(--bl);font-family:'DM Sans',sans-serif;min-height:100vh;padding:16px;}
header{text-align:center;padding:20px 0 14px;border-bottom:1px solid var(--gb);margin-bottom:18px;}
header::after{content:'';display:block;width:60px;height:3px;background:var(--v);margin:8px auto 0;}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,8vw,4rem);letter-spacing:4px;line-height:1;}
h1 span{color:var(--v);}
.sub{color:var(--gt);font-size:.82rem;margin-top:5px;}
.liga-sel{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
#lsel{flex:1;min-width:110px;background:var(--gm);border:1px solid var(--gb);color:var(--bl);padding:9px 11px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:700;}
.btn{background:var(--gm);border:1px solid var(--gb);color:var(--bl);padding:9px 11px;border-radius:6px;font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .2s;}
.btn:hover{opacity:.8;}
.bp{background:var(--v);border-color:var(--v);color:var(--n);}
.bw{background:#ff6b6b22;border-color:#ff6b6b66;color:var(--rd);}
.tabs{display:flex;gap:4px;margin-bottom:18px;overflow-x:auto;padding-bottom:3px;}
.tab{font-family:'Bebas Neue',sans-serif;letter-spacing:1.2px;font-size:.78rem;padding:8px 10px;background:var(--gm);border:1px solid var(--gb);color:var(--gt);cursor:pointer;border-radius:4px;white-space:nowrap;}
.tab.active{background:var(--v);color:var(--n);border-color:var(--v);}
.panel{display:none;}.panel.active{display:block;}
/* TABLA */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.82rem;}
thead th{font-family:'Bebas Neue',sans-serif;font-size:.75rem;color:var(--gt);padding:7px;text-align:center;border-bottom:1px solid var(--gb);}
thead th:first-child{text-align:left;}
tbody tr{border-bottom:1px solid var(--gb);}
tbody tr:hover{background:var(--gm);}
tbody td{padding:10px 7px;text-align:center;}
tbody td:first-child{text-align:left;}
.pb{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:3px;font-family:'Bebas Neue',sans-serif;font-size:.85rem;margin-right:5px;}
.p1{background:var(--am);color:var(--n);}.p2{background:#aaa;color:var(--n);}.p3{background:#c87533;color:#fff;}.px{background:var(--gb);color:var(--gt);}
.pn{font-weight:700;}.pts{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--v);}
.hl td:first-child{border-left:3px solid var(--v);}
.racha{display:flex;gap:2px;margin-left:6px;}
.rc{width:10px;height:10px;border-radius:50%;display:inline-block;}
.rc.W{background:var(--v);}.rc.L{background:var(--rd);}.rc.E{background:var(--am);}
/* LIGA TERMINADA BANNER */
.liga-fin-banner{background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,215,0,.04));border:1px solid rgba(255,215,0,.4);border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.liga-fin-banner .lf-txt{font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:.9rem;color:var(--am);}
.liga-fin-banner .lf-sub{font-size:.7rem;color:var(--gt);margin-top:2px;}
/* FIXTURE */
.jorn{margin-bottom:20px;}
.jt{font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:.95rem;color:var(--v);margin-bottom:7px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.jt::after{content:'';flex:1;height:1px;background:var(--gb);}
.jt-toggle{font-size:.7rem;color:var(--gt);margin-left:4px;}
.jorn-h2h{display:none;background:var(--gm);border:1px solid var(--gb);border-radius:8px;padding:12px;margin-bottom:8px;}
.jorn-h2h h4{font-family:'Bebas Neue',sans-serif;letter-spacing:1.5px;font-size:.85rem;color:var(--am);margin-bottom:8px;}
.h2h-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--gb);font-size:.78rem;}
.h2h-row:last-child{border-bottom:none;}
.partido{background:var(--gm);border:1px solid var(--gb);border-radius:8px;padding:10px 14px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;margin-bottom:6px;gap:8px;}
.tl{text-align:right;font-weight:700;font-size:.88rem;}
.tv{text-align:left;font-weight:700;font-size:.88rem;}
.scb{display:flex;align-items:center;gap:5px;justify-content:center;}
.sc{width:44px;height:44px;background:var(--n);border:1px solid var(--gb);border-radius:6px;color:var(--bl);font-family:'Bebas Neue',sans-serif;font-size:1.4rem;text-align:center;outline:none;-moz-appearance:textfield;}
.sc::-webkit-outer-spin-button,.sc::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.sc:focus{border-color:var(--v);}
.sc:disabled{opacity:.35;cursor:not-allowed;}
.scd{color:var(--gt);font-size:1rem;font-weight:700;}
.ok{border-left:3px solid var(--v);}
/* PREDICCIONES en fixture */
.pred-box{background:#111;border:1px solid var(--gb);border-radius:6px;padding:8px 10px;margin-top:6px;font-size:.75rem;}
.pred-box-title{font-family:'Bebas Neue',sans-serif;letter-spacing:1.5px;font-size:.7rem;color:var(--gt);margin-bottom:6px;}
.pred-form{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.pred-sel{background:var(--n);border:1px solid var(--gb);color:var(--bl);padding:5px 7px;border-radius:5px;font-size:.75rem;font-family:'DM Sans',sans-serif;}
.pred-inp{width:36px;height:32px;background:var(--n);border:1px solid var(--gb);border-radius:4px;color:var(--bl);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;text-align:center;outline:none;-moz-appearance:textfield;}
.pred-inp::-webkit-outer-spin-button,.pred-inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.pred-inp:focus{border-color:var(--v);}
.pred-btn{background:var(--v);border:none;color:var(--n);padding:5px 10px;border-radius:4px;font-family:'Bebas Neue',sans-serif;font-size:.75rem;cursor:pointer;letter-spacing:1px;}
.pred-result-row{display:flex;align-items:center;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--gb);}
.pred-result-row:last-child{border-bottom:none;}
.pred-pts{font-family:'Bebas Neue',sans-serif;font-size:.85rem;}
.pts3{color:var(--v);}.pts2{color:var(--am);}.pts1{color:#aaa;}.pts0{color:var(--rd);}
/* TABLA POR FECHA */
.fecha-sel-wrap{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
.fecha-sel{background:var(--gm);border:1px solid var(--gb);color:var(--bl);padding:7px 10px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.82rem;}
/* FOTOS PARTIDO */
.foto-wrap{margin-top:6px;}
.foto-preview{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;}
.foto-thumb{width:70px;height:70px;object-fit:cover;border-radius:6px;border:1px solid var(--gb);cursor:pointer;}
.foto-thumb:hover{border-color:var(--v);}
.foto-modal-img{max-width:100%;border-radius:8px;margin-top:8px;}
.foto-label{font-size:.68rem;color:var(--gt);margin-bottom:4px;}
.foto-add-btn{background:var(--gm);border:1px dashed var(--gb);color:var(--gt);padding:6px 10px;border-radius:5px;font-size:.75rem;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.foto-add-btn:hover{border-color:var(--v);color:var(--bl);}
/* PIN */
.pin-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.pin-row{display:flex;align-items:center;gap:8px;background:var(--gm);border:1px solid var(--gb);border-radius:6px;padding:8px 10px;}
.pin-nombre{font-weight:700;font-size:.85rem;flex:1;}
.pin-inp{width:80px;background:var(--n);border:1px solid var(--gb);color:var(--bl);padding:6px 8px;border-radius:5px;font-size:.88rem;outline:none;font-family:'DM Sans',sans-serif;letter-spacing:3px;}
.pin-inp:focus{border-color:var(--v);}
.pred-pin-wrap{display:flex;align-items:center;gap:5px;margin-top:5px;}
.pred-pin-inp{width:80px;background:var(--n);border:1px solid var(--gb);color:var(--bl);padding:5px 7px;border-radius:5px;font-size:.82rem;outline:none;font-family:'DM Sans',sans-serif;letter-spacing:3px;}
.pred-pin-inp:focus{border-color:var(--v);}
/* COPA */
.rt{font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:.95rem;color:var(--am);margin-bottom:8px;}
.bm{background:var(--gm);border:1px solid var(--gb);border-radius:8px;overflow:hidden;max-width:420px;margin-bottom:11px;}
.bt{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--gb);gap:8px;}
.bt:last-child{border-bottom:none;}
.bn{font-weight:700;font-size:.85rem;flex:1;}
.bs{width:44px;height:36px;background:var(--n);border:1px solid var(--gb);border-radius:4px;color:var(--bl);font-family:'Bebas Neue',sans-serif;font-size:1.3rem;text-align:center;outline:none;-moz-appearance:textfield;}
.bs::-webkit-outer-spin-button,.bs::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.bs:focus{border-color:var(--v);}
.bs:disabled{opacity:.3;}
.bmt{font-family:'Bebas Neue',sans-serif;letter-spacing:1.2px;font-size:.7rem;color:var(--gt);padding:5px 12px;background:#161616;border-bottom:1px solid var(--gb);}
.br{margin:3px 0 10px;font-size:.75rem;color:var(--gt);padding-left:3px;}
.bye{font-size:.6rem;color:var(--v);font-family:'Bebas Neue',sans-serif;background:rgba(0,255,135,.1);padding:2px 4px;border-radius:3px;margin-left:5px;}
.div{height:1px;background:var(--gb);margin:14px 0;}
/* EMPATE DROPDOWN COPA */
.empate-sel{width:100%;background:var(--n);border:1px solid var(--am);color:var(--bl);padding:8px 10px;border-radius:5px;font-family:'DM Sans',sans-serif;font-size:.85rem;margin-top:6px;font-weight:700;}
/* PREMIOS */
.pc{background:var(--gm);border:1px solid var(--gb);border-radius:8px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.pc.oro{border-left:3px solid var(--am);}.pc.plata{border-left:3px solid #aaa;}.pc.bronce{border-left:3px solid #c87533;}.pc.verde{border-left:3px solid var(--v);}
.pct{font-family:'Bebas Neue',sans-serif;letter-spacing:1px;font-size:.88rem;}
.pcd{font-size:.72rem;color:var(--gt);margin-top:2px;}
.pcg{font-size:.78rem;color:var(--bl);margin-top:3px;font-weight:700;}
.pcm{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--v);white-space:nowrap;}
.ptot{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--gm);border:1px solid var(--am);border-radius:8px;margin-top:12px;}
.ptot .pct{color:var(--am);}.ptot .pcm{color:var(--am);font-size:1.6rem;}
.ami-badge{display:inline-block;background:rgba(0,255,135,.12);color:var(--v);border:1px solid var(--v);border-radius:4px;font-family:'Bebas Neue',sans-serif;letter-spacing:1.5px;font-size:.78rem;padding:3px 8px;margin-left:8px;}
.pi{background:var(--gm);border:1px solid var(--gb);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.pi-i{font-size:1.3rem;flex-shrink:0;}
.pi-n{font-weight:700;font-size:.85rem;}
.pi-d{font-size:.7rem;color:var(--gt);margin-top:2px;}
.pi-w{margin-left:auto;font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--v);white-space:nowrap;}
/* PERFILES */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:14px;}
.pbtn{background:var(--gm);border:1px solid var(--gb);border-radius:8px;padding:12px 8px;text-align:center;cursor:pointer;transition:border-color .2s;}
.pbtn:hover,.pbtn.active{border-color:var(--v);}
.pav{font-size:1.7rem;margin-bottom:4px;}.pnm{font-weight:700;font-size:.82rem;}
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;}
.sc2{background:var(--gm);border:1px solid var(--gb);border-radius:8px;padding:12px 13px;}
.sl{font-size:.68rem;color:var(--gt);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.sv{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--v);}
.sv.sn{color:var(--bl);}.sv.sb{color:var(--rd);}
.hp{background:var(--gm);border:1px solid var(--gb);border-radius:5px;padding:8px 11px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;font-size:.78rem;}
.W{color:var(--v);font-weight:700;}.L{color:var(--rd);font-weight:700;}.E{color:var(--am);font-weight:700;}
.trofeos-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.trofeo{background:#161616;border:1px solid var(--gb);border-radius:6px;padding:8px 12px;display:flex;align-items:center;gap:8px;}
.trofeo.comp{border-color:var(--am);background:rgba(255,215,0,.05);}
.trofeo.ami{border-color:var(--v);background:rgba(0,255,135,.05);}
.trofeo-tipo{font-size:.65rem;color:var(--gt);text-transform:uppercase;}
.plata-total{background:linear-gradient(135deg,rgba(255,215,0,.08),rgba(255,215,0,.03));border:1px solid rgba(255,215,0,.3);border-radius:8px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.plata-total .label{font-size:.72rem;color:var(--gt);}
.plata-total .monto{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--am);}
.familia-box{background:var(--gm);border:1px solid var(--gb);border-radius:8px;padding:12px 14px;margin-bottom:10px;}
.familia-titulo{font-family:'Bebas Neue',sans-serif;letter-spacing:1.5px;font-size:.9rem;color:var(--am);margin-bottom:8px;}
.familia-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:.82rem;border-bottom:1px solid var(--gb);}
.familia-row:last-child{border-bottom:none;}
.papa-tag{color:var(--v);font-size:.7rem;font-family:'Bebas Neue',sans-serif;background:rgba(0,255,135,.1);padding:1px 6px;border-radius:3px;}
.hijo-tag{color:var(--rd);font-size:.7rem;font-family:'Bebas Neue',sans-serif;background:rgba(255,107,107,.1);padding:1px 6px;border-radius:3px;}
.ib{background:var(--gm);border:1px solid var(--gb);border-left:3px solid var(--v);border-radius:6px;padding:10px 12px;font-size:.78rem;color:var(--gt);line-height:1.6;margin-bottom:14px;}
.ib strong{color:var(--bl);}.ib.am{border-left-color:var(--am);}
.sec{font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:.95rem;color:var(--bl);margin:16px 0 8px;}
/* PREDICCIONES TAB */
.pred-ranking{background:var(--gm);border:1px solid var(--gb);border-radius:8px;overflow:hidden;margin-bottom:14px;}
.pred-ranking-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--gb);font-size:.82rem;}
.pred-ranking-row:last-child{border-bottom:none;}
.pred-rank-pos{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gt);width:24px;}
.pred-rank-pts{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--v);}
.pred-rank-detail{font-size:.7rem;color:var(--gt);}
/* LIVE */
.live-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.4);border-radius:4px;padding:3px 8px;font-family:'Bebas Neue',sans-serif;font-size:.72rem;color:var(--rd);letter-spacing:1.5px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--rd);animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.sync-status{font-size:.68rem;color:var(--gt);}
.sync-ok{color:var(--v);}.sync-err{color:var(--rd);}
/* ADMIN */
.admin-card{background:var(--gm);border:1px solid var(--gb);border-radius:10px;padding:20px;max-width:340px;margin:0 auto;}
.admin-card h2{font-family:'Bebas Neue',sans-serif;letter-spacing:3px;font-size:1.4rem;color:var(--v);margin-bottom:6px;text-align:center;}
.admin-card p{font-size:.78rem;color:var(--gt);text-align:center;margin-bottom:16px;}
.admin-card input{width:100%;background:var(--n);border:1px solid var(--gb);color:var(--bl);padding:10px 12px;border-radius:6px;font-size:.95rem;outline:none;font-family:'DM Sans',sans-serif;margin-bottom:10px;letter-spacing:3px;}
.admin-card input:focus{border-color:var(--v);}
.admin-logged{background:var(--gm);border:1px solid var(--v);border-radius:10px;padding:20px;max-width:340px;margin:0 auto;text-align:center;}
.admin-logged h2{font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:1.2rem;color:var(--v);margin-bottom:8px;}
.admin-logged p{font-size:.78rem;color:var(--gt);margin-bottom:14px;}
.toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--v);color:var(--n);padding:8px 18px;border-radius:6px;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:.88rem;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.78);z-index:1000;align-items:center;justify-content:center;padding:14px;}
.mo.show{display:flex;}
.mb{background:var(--gm);border:1px solid var(--gb);border-radius:10px;padding:18px;max-width:390px;width:100%;max-height:88vh;overflow-y:auto;}
.mt{font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:1.2rem;color:var(--v);margin-bottom:12px;}
.mb p{font-size:.78rem;color:var(--gt);line-height:1.5;margin-bottom:7px;}
.mb input[type=text],.mb input[type=number],.mb textarea{width:100%;background:var(--n);border:1px solid var(--gb);color:var(--bl);padding:8px 10px;border-radius:5px;font-size:.88rem;margin-bottom:7px;outline:none;font-family:'DM Sans',sans-serif;}
.mb input:focus,.mb textarea:focus{border-color:var(--v);}
.mb label{display:flex;align-items:center;gap:7px;cursor:pointer;color:var(--bl);font-size:.8rem;padding:4px 0;}
.ma{display:flex;gap:7px;justify-content:flex-end;margin-top:12px;}
.jlista{display:flex;flex-direction:column;gap:5px;margin-bottom:8px;}
.jrow{display:flex;gap:5px;align-items:center;}
.jrow input{flex:1;margin-bottom:0;}
.jrow .btn{padding:5px 8px;font-size:.72rem;}
@media(max-width:480px){.partido{grid-template-columns:1fr;}.tl,.tv{text-align:center;}}
</style>
</head>
<body>
<header>
  <h1>LIGA <span>eFootball</span></h1>
  <p class="sub" id="sub">—</p>
  <div style="margin-top:8px;display:flex;justify-content:center;gap:10px;align-items:center;">
    <span class="live-badge"><span class="live-dot"></span>EN VIVO</span>
    <span class="sync-status" id="sync-status">Conectando...</span>
  </div>
</header>
<div class="liga-sel">
  <select id="lsel" onchange="cambiarLiga(this.value)"></select>
  <button class="btn" onclick="abrirRenombrar()" id="btn-rename" style="display:none">✏️</button>
  <button class="btn bp" onclick="abrirNuevaLiga()" id="btn-nueva" style="display:none">➕ Nueva</button>
</div>
<div class="tabs">
  <button class="tab active" onclick="showTab('tabla',this)">📊 Tabla</button>
  <button class="tab" onclick="showTab('tablafecha',this)">📈 Por fecha</button>
  <button class="tab" onclick="showTab('fixture',this)">📅 Fixture</button>
  <button class="tab" onclick="showTab('copa',this)">🏆 Copa</button>
  <button class="tab" onclick="showTab('premios',this)">💰 Premios</button>
  <button class="tab" onclick="showTab('ind',this)">⭐ Indiv.</button>
  <button class="tab" onclick="showTab('pred',this)">🎯 Predicc.</button>
  <button class="tab" onclick="showTab('perfiles',this)">👤 Perfiles</button>
  <button class="tab" onclick="showTab('admin',this)">⚙️ Admin</button>
</div>

function generarTituloPartido(local, visitante, gl, gv) {
  const glN = parseInt(gl), gvN = parseInt(gv);
  const dif = Math.abs(glN - gvN);
  const ganador = glN > gvN ? local : visitante;
  const perdedor = glN > gvN ? visitante : local;
  if (glN === gvN) {
    if (glN === 0) return `🤐 ${local} y ${visitante} empatan 0-0`;
    return `😤 ${local} y ${visitante} empatan ${glN}-${gvN}`;
  }
  if (dif >= 4) return `💥 ¡GOLEADA! ${ganador} aplasta ${glN > gvN ? glN+'-'+gvN : gvN+'-'+glN} a ${perdedor}`;
  if (dif === 3) return `🔥 ${ganador} golea ${glN > gvN ? glN+'-'+gvN : gvN+'-'+glN} a ${perdedor}`;
  if (dif === 2) return `⚽ ${ganador} gana cómodo ${glN > gvN ? glN+'-'+gvN : gvN+'-'+glN} a ${perdedor}`;
  return `😬 ${ganador} gana por poco ${glN > gvN ? glN+'-'+gvN : gvN+'-'+glN} a ${perdedor}`;
}

/* ============================================================
   FIXTURE GENERATOR
   ============================================================ */
function genFixture(jugadores,mezclar){
  let L=[...jugadores];
  if(L.length%2!==0)L.push('BYE');
  const n=L.length,arr=[...L],rondas=[];
  for(let r=0;r<n-1;r++){
    const ps=[];
    for(let i=0;i<n/2;i++){
      const a=arr[i],b=arr[n-1-i];
      if(a!=='BYE'&&b!=='BYE')ps.push(r%2===0?{L:a,V:b}:{L:b,V:a});
    }
    rondas.push(ps);
    const f=arr[0],rest=arr.slice(1);rest.unshift(rest.pop());arr.splice(0,arr.length,f,...rest);
  }
  const vuelta=rondas.map(ps=>ps.map(p=>({L:p.V,V:p.L})));
  let todas=[...rondas,...vuelta];
  if(mezclar){
    for(let i=todas.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[todas[i],todas[j]]=[todas[j],todas[i]];}
    todas=todas.map(ps=>{
      const c=ps.map(p=>Math.random()<.5?{L:p.V,V:p.L}:{...p});
      for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]];}
      return c;
    });
  }
  return todas.map((ps,i)=>({f:i+1,ps}));
}

/* ============================================================
   TABLA con racha
   ============================================================ */
function calcTabla(){
  const s={};
  liga.jugadores.forEach(j=>{s[j]={pj:0,g:0,e:0,p:0,gf:0,gc:0,pts:0,partidos:[]};});
  liga.fixture.forEach(jorn=>{
    jorn.ps.forEach(p=>{
      const key=`j${jorn.f}_${p.L}_${p.V}`;
      const res=liga.resultados[key];
      if(!res||res.gl===''||res.gv==='')return;
      const gl=parseInt(res.gl),gv=parseInt(res.gv);
      if(isNaN(gl)||isNaN(gv))return;
      [[p.L,gl,gv],[p.V,gv,gl]].forEach(([j,gf,gc])=>{
        s[j].pj++;s[j].gf+=gf;s[j].gc+=gc;
        s[j].partidos.push({rival:j===p.L?p.V:p.L,gf,gc,jornada:jorn.f});
        if(gf>gc){s[j].g++;s[j].pts+=3;}else if(gc>gf)s[j].p++;else{s[j].e++;s[j].pts++;}
      });
    });
  });
  return Object.entries(s).sort((a,b)=>{
    const[,sa]=a,[,sb]=b;
    if(sb.pts!==sa.pts)return sb.pts-sa.pts;
    const da=sa.gf-sa.gc,db=sb.gf-sb.gc;
    if(db!==da)return db-da;
    return sb.gf-sa.gf;
  });
}

function calcRachaActual(partidos){
  const sorted=[...partidos].sort((a,b)=>a.jornada-b.jornada);
  const ultimos=sorted.slice(-5);
  return ultimos.map(p=>p.gf>p.gc?'W':p.gf<p.gc?'L':'E');
}

function renderTabla(){
  if(!liga)return;
  const sorted=calcTabla();
  const bdg=['p1','p2','p3'];
  document.getElementById('tbody').innerHTML=sorted.map(([n,s],i)=>{
    const racha=calcRachaActual(s.partidos);
    const rachaHtml=racha.length?`<div class="racha">${racha.map(r=>`<span class="rc ${r}"></span>`).join('')}</div>`:'<span style="color:var(--gt);font-size:.65rem;">—</span>';

      <td>${s.pj}</td><td>${s.g}</td><td>${s.e}</td><td>${s.p}</td>
      <td>${s.gf}</td><td>${s.gc}</td>
      <td>${s.gf-s.gc>0?'+':''}${s.gf-s.gc}</td>
      <td class="pts">${s.pts}</td>
    </tr>`;
  }).join('');
  document.getElementById('fix-ib').innerHTML=`<strong>Todos contra todos — ida y vuelta (${liga.fixture.length} fechas)</strong><br>Los resultados se sincronizan en tiempo real.`;
  const order=sorted.map(([n])=>n),sm=Object.fromEntries(sorted);
  renderCopa(order);renderPremios(order,sm);renderInd(sm);renderPred();
}

    if(!liga.fotos)liga.fotos={};

function getH2H(j1,j2){
  let w1=0,w2=0,emp=0;
  liga.fixture.forEach(jorn=>{
    jorn.ps.forEach(p=>{
      if(!((p.L===j1&&p.V===j2)||(p.L===j2&&p.V===j1)))return;
      const key=`j${jorn.f}_${p.L}_${p.V}`;
      const res=liga.resultados[key];
      if(!res||res.gl===''||res.gv==='')return;
      const gl=parseInt(res.gl),gv=parseInt(res.gv);if(isNaN(gl)||isNaN(gv))return;
      const ganador=gl>gv?p.L:gv>gl?p.V:null;
      if(ganador===j1)w1++;else if(ganador===j2)w2++;else emp++;
    });
  });
  return{w1,w2,emp};
}

   PREDICCIONES
   ============================================================ */
function calcPuntosPred(predL,predV,realL,realV){
  const pL=parseInt(predL),pV=parseInt(predV);
  if(isNaN(pL)||isNaN(pV))return 0;
  // Exacto
  if(pL===realL&&pV===realV)return 3;
  // Ganador correcto + diferencia exacta
  const predDif=pL-pV,realDif=realL-realV;
  const predGan=pL>pV?'L':pL<pV?'V':'E';
  const realGan=realL>realV?'L':realL<realV?'V':'E';
  if(predGan===realGan&&predDif===realDif)return 2;
  // Solo ganador o empate
  if(predGan===realGan)return 1;
  return 0;
}

async function guardarPred(key,local,visitante){
  const jugador=document.getElementById('ps_'+key)?.value;
  const gl=document.getElementById('pgl_'+key)?.value;
  const gv=document.getElementById('pgv_'+key)?.value;
  const pin=document.getElementById('ppin_'+key)?.value||'';
  if(!jugador){toast('Elegí tu nombre');return;}
  if(gl===''||gv===''){toast('Ingresá tu predicción');return;}
  // Verificar PIN si está configurado
  const pins=liga.pins||{};
  if(pins[jugador]&&String(pins[jugador])!==String(pin)){toast('❌ PIN incorrecto');return;}
  if(Object.keys(pins).length>0&&!pins[jugador]){toast('❌ Este jugador no tiene PIN asignado');return;}
  // Verificar que el partido no tenga resultado aún
  const res=liga.resultados[key];
  if(res&&res.gl!==''&&res.gv!==''){toast('Este partido ya terminó');return;}
  if(!liga.predicciones)liga.predicciones={};
  if(!liga.predicciones[key])liga.predicciones[key]=[];
  // Si ya predijo, actualizar
  const idx2=liga.predicciones[key].findIndex(p=>p.jugador===jugador);
  if(idx2>=0)liga.predicciones[key][idx2]={jugador,gl:parseInt(gl),gv:parseInt(gv)};
  else liga.predicciones[key].push({jugador,gl:parseInt(gl),gv:parseInt(gv)});
  await guardarEnSupabase();
  renderFixture();renderPred();
  toast(`✓ Predicción de ${jugador} guardada`);
}

function calcRankingPred(){
  const pts={};
  liga.jugadores.forEach(j=>{pts[j]={pts:0,exactos:0,ganador:0,total:0};});
  Object.entries(liga.predicciones||{}).forEach(([key,preds])=>{
    const res=liga.resultados[key];
    if(!res||res.gl===''||res.gv==='')return;
    const gl=parseInt(res.gl),gv=parseInt(res.gv);
    preds.forEach(pr=>{
      if(!pts[pr.jugador])return;
      const p=calcPuntosPred(pr.gl,pr.gv,gl,gv);
      pts[pr.jugador].pts+=p;pts[pr.jugador].total++;
      if(p===3)pts[pr.jugador].exactos++;
      if(p>=1)pts[pr.jugador].ganador++;
    });
  });
  return Object.entries(pts).sort((a,b)=>b[1].pts-a[1].pts||b[1].exactos-a[1].exactos);
}

function gV(k){const v=liga.copa[k];if(v===undefined||v==='')return null;const n=parseInt(v);return isNaN(n)?null:n;}
function gGlobal(mid,solo){
  const iL=gV(mid+'_il'),iV=gV(mid+'_iv');if(iL===null||iV===null)return null;
  if(solo)return{L:iL,V:iV};
  const vL=gV(mid+'_vl'),vV=gV(mid+'_vv');if(vL===null||vV===null)return null;
  return{L:iL+vL,V:iV+vV};
}
function empateGanador(mid){return liga.copa[mid+'_emp']||null;}
function rsvM(mid,nL,nV,solo){
  const g=gGlobal(mid,solo);if(!g)return{w:null,l:null};
  if(g.L>g.V)return{w:nL,l:nV};
  if(g.V>g.L)return{w:nV,l:nL};
  // empate — ver si admin eligió ganador
  const emp=empateGanador(mid);
  if(emp)return{w:emp,l:emp===nL?nV:nL};
  return{w:null,l:null};
}
function htmlIV(mid,nL,nV,forceDisabled){

async function gCopa(){
  if(!isAdmin)return;
  // Guardar estado anterior para detectar cambios
  const winsAntes=getWins(calcTabla().map(([n])=>n));
  document.querySelectorAll('.bs').forEach(el=>{liga.copa[el.id]=el.value;});
  document.querySelectorAll('.empate-sel').forEach(el=>{liga.copa[el.id]=el.value;});
  await guardarEnSupabase();
  const s=calcTabla(),order=s.map(([n])=>n),sm=Object.fromEntries(s);
  renderCopa(order);renderPremios(order,sm);renderInd(sm);
  // Notificaciones copa
  const winsAhora=getWins(order);
  if(!winsAntes.campeon&&winsAhora.campeon){
    enviarNotificacion(`🏆 ¡CAMPEÓN! ${winsAhora.campeon}`,`${winsAhora.campeon} gana la Copa de ${liga.nombre}! 🎉`);
  } else if(!winsAntes.tercero&&winsAhora.tercero){
    enviarNotificacion(`🥉 ${winsAhora.tercero} se lleva el 3er puesto`,`${liga.nombre} — Tercer puesto definido`);
  }
  toast('✓ GUARDADO');
}

function getWins(order){
  const fin=gGlobal('fin',true),tp=gGlobal('tp',false);
  let campeon=null,subcamp=null,tercero=null;
  if(fin){const{w:fc,l:fs}=rsvM('fin',order[0],order[1],true);campeon=fc;subcamp=fs;}
  if(tp){const{w:tc}=rsvM('tp',order[2],order[3]);tercero=tc;}
  return{campeon,subcamp,tercero};
}

/* ============================================================
   TROFEOS — resetear y recalcular desde resultados reales
   ============================================================ */
async function resetearTrofeos(){
  if(!isAdmin)return;
  aModal('🔧 RESETEAR TROFEOS',`<p>Esto va a borrar los trofeos actuales de esta liga y los va a recalcular desde los resultados reales. ¿Seguro?</p>`,async()=>{
    liga.trofeos=[];
    const s=calcTabla(),order=s.map(([n])=>n);
    const wins=getWins(order);
    const tipo=liga.pozo.amistoso?'amistoso':'competitivo';
    const total=liga.pozo.total;
    const nuevos=[];
    // Trofeos copa
    if(wins.campeon)nuevos.push({jugador:wins.campeon,tipo_premio:'campeon_copa',tipo,ligaNombre:liga.nombre,ligaId:liga.id,dinero:Math.round(total*PCTG.campeon)});
    if(wins.subcamp)nuevos.push({jugador:wins.subcamp,tipo_premio:'subcamp_copa',tipo,ligaNombre:liga.nombre,ligaId:liga.id,dinero:Math.round(total*PCTG.subcamp)});
    if(wins.tercero)nuevos.push({jugador:wins.tercero,tipo_premio:'tercero_copa',tipo,ligaNombre:liga.nombre,ligaId:liga.id,dinero:Math.round(total*PCTG.tercero)});
    // Trofeo liga 1 — solo si la liga está terminada
    if(liga.terminada&&order[0])nuevos.push({jugador:order[0],tipo_premio:'liga1',tipo,ligaNombre:liga.nombre,ligaId:liga.id,dinero:Math.round(total*PCTG.liga1)});
    liga.trofeos=nuevos;
    await guardarEnSupabase();
    cModal();
    renderTabla();
    toast('✓ Trofeos recalculados correctamente');
  });
}

async function guardarTrofeosCopa(wins,order){
  if(!liga)return;
  const trofeos=liga.trofeos||[];
  if(trofeos.some(t=>t.tipo_premio==='campeon_copa'))return;
  const tipo=liga.pozo.amistoso?'amistoso':'competitivo';
  const total=liga.pozo.total;
  const nuevos=[
    {jugador:wins.campeon,tipo_premio:'campeon_copa',tipo,ligaNombre:liga.nombre,ligaId:liga.id,dinero:Math.round(total*PCTG.campeon)},
    {jugador:wins.subcamp,tipo_premio:'subcamp_copa',tipo,ligaNombre:liga.nombre,ligaId:liga.id,dinero:Math.round(total*PCTG.subcamp)},
  ];
  if(wins.tercero)nuevos.push({jugador:wins.tercero,tipo_premio:'tercero_copa',tipo,ligaNombre:liga.nombre,ligaId:liga.id,dinero:Math.round(total*PCTG.tercero)});
  liga.trofeos=[...trofeos,...nuevos];
  await guardarEnSupabase();
}

async function guardarTrofeoLiga1(order){
  if(!liga||!isAdmin)return;
  const trofeos=liga.trofeos||[];
  if(trofeos.some(t=>t.tipo_premio==='liga1')){toast('Ya guardado');return;}
  const tipo=liga.pozo.amistoso?'amistoso':'competitivo';
  const lider=order[0];if(!lider)return;
  liga.trofeos=[...trofeos,{jugador:lider,tipo_premio:'liga1',tipo,ligaNombre:liga.nombre,ligaId:liga.id,dinero:Math.round(liga.pozo.total*PCTG.liga1)}];
  await guardarEnSupabase();toast('🏅 Trofeo Liga 1 guardado');
}

   PREMIOS
   ============================================================ */
function renderPremios(order,sm){
  if(!liga)return;
  const total=liga.pozo.total,ami=liga.pozo.amistoso;
  const mon=p=>ami?0:Math.round(total*PCTG[p]);
  const w=getWins(order);
  const gans={liga1:order[0]||null,...w};
  const items=[
    {id:'liga1',label:'1° de la Liga',desc:'Mejor posición tabla regular',clase:'verde'},
    {id:'campeon',label:'Campeón Copa',desc:'Ganador de la final',clase:'oro'},
    {id:'subcamp',label:'Subcampeón Copa',desc:'Finalista',clase:'plata'},
    {id:'tercero',label:'3° puesto Copa',desc:'Ganador 3er puesto',clase:'bronce'},
  ];
  let html=`<div class="ib${ami?' am':''}">Pozo: <strong>${ami?'AMISTOSO':'$'+total+' ($'+liga.pozo.porPersona+' × '+liga.jugadores.length+')'}</strong>${ami?'<span class="ami-badge">🎮 AMISTOSO</span>':''}</div>`;
  items.forEach(p=>{
    const g=gans[p.id],m=mon(p.id);
    html+=`<div class="pc ${p.clase}"><div><div class="pct">${p.label}</div><div class="pcd">${p.desc}</div>${g?`<div class="pcg">→ ${g}</div>`:`<div class="pcd" style="font-style:italic;">Pendiente</div>`}</div><div class="pcm">${ami?'—':'$'+m}</div></div>`;
  });
  if(isAdmin){
    const yaLiga1=(liga.trofeos||[]).some(t=>t.tipo_premio==='liga1');
    if(!yaLiga1)html+=`<button class="btn" style="width:100%;margin-top:8px;font-size:.75rem;" onclick="guardarTrofeoLiga1(${JSON.stringify(order)})">🏅 Guardar trofeo Liga 1 (al terminar)</button>`;
  }
  if(!ami){
    const tots={};liga.jugadores.forEach(j=>tots[j]=0);
    items.forEach(p=>{const g=gans[p.id];if(g&&tots[g]!==undefined)tots[g]+=mon(p.id);});
    const con=Object.entries(tots).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
    if(con.length>0){html+=`<div class="div"></div><div class="rt">💵 RESUMEN</div>`;con.forEach(([n,m])=>html+=`<div class="pc"><div class="pct">${n}</div><div class="pcm">$${m}</div></div>`);}
    html+=`<div class="ptot"><span class="pct">POZO TOTAL</span><span class="pcm">$${total}</span></div>`;
  }
  document.getElementById('pre-con').innerHTML=html;
}

/* ============================================================
   PREMIOS INDIVIDUALES
   ============================================================ */
function calcInd(sm){
  const js=liga.jugadores,en=js.map(j=>({n:j,...sm[j]}));
  const srt=fn=>[...en].filter(e=>e.pj>0).sort(fn);
  const gol=srt((a,b)=>b.gf-a.gf)[0],sol=srt((a,b)=>a.gc-b.gc)[0];
  const dg=srt((a,b)=>(b.gf-b.gc)-(a.gf-a.gc))[0];
  const mvp=srt((a,b)=>(b.pts*10+(b.gf-b.gc)*5+b.gf)-(a.pts*10+(a.gf-a.gc)*5+a.gf))[0];
  const rev=srt((a,b)=>((b.gf-b.gc)/b.pj)-((a.gf-a.gc)/a.pj))[0];
  const dec=srt((a,b)=>((a.gf-a.gc)/a.pj)-((b.gf-b.gc)/b.pj))[0];
  const gaga=srt((a,b)=>b.p-a.p)[0];
  const racha=calcRachaMejor(sm),bp=bestP(),verd=bestV();
  return[
    {i:'🎯',n:'Goleador',d:`${gol?.gf||0} goles`,g:gol?.n||'—'},
    {i:'🛡️',n:'Más sólido',d:`${sol?.gc||0} gc`,g:sol?.n||'—'},
    {i:'💥',n:'Mejor DG',d:`${dg?(dg.gf-dg.gc>0?'+':'')+(dg.gf-dg.gc):0}`,g:dg?.n||'—'},
    {i:'🏆',n:'MVP',d:'El más dominante',g:mvp?.n||'—'},
    {i:'⭐',n:'Revelación',d:'Mejor rend./partido',g:rev?.n||'—'},
    {i:'💔',n:'Decepción',d:'Peor rend./partido',g:dec?.n||'—'},
    {i:'🥶',n:'El más gagá',d:`${gaga?.p||0} derrotas`,g:gaga?.n||'—'},
    {i:'🔥',n:'Mejor racha',d:`${racha.max} victorias seguidas`,g:racha.j||'—'},
    {i:'⚽',n:'Mejor partido',d:bp?`${bp.L} ${bp.gl}–${bp.gv} ${bp.V}`:'Pendiente',g:bp?`Fecha ${bp.f}`:'—'},
    {i:'💣',n:'Verdugo',d:`${verd.max} goles en un partido`,g:verd.j||'—'},
  ];
}
function calcRachaMejor(sm){
  let bj='—',bm=0;
  liga.jugadores.forEach(j=>{
    const ps=(sm[j]?.partidos||[]).sort((a,b)=>a.jornada-b.jornada);
    let r=0,m=0;ps.forEach(p=>{if(p.gf>p.gc){r++;m=Math.max(m,r);}else r=0;});
    if(m>bm){bm=m;bj=j;}
  });
  return{j:bj,max:bm};
}
function bestP(){
  let bp=null,mx=0;
  liga.fixture.forEach(j=>j.ps.forEach(p=>{
    const k=`j${j.f}_${p.L}_${p.V}`;const r=liga.resultados[k];
    if(!r||r.gl===''||r.gv==='')return;const gl=parseInt(r.gl),gv=parseInt(r.gv);if(isNaN(gl)||isNaN(gv))return;
    if(gl+gv>mx){mx=gl+gv;bp={L:p.L,V:p.V,gl,gv,f:j.f};}
  }));return bp;
}
function bestV(){
  let bj='—',bm=0;
  liga.jugadores.forEach(j=>{
    let m=0;
    liga.fixture.forEach(jorn=>jorn.ps.forEach(p=>{
      const k=`j${jorn.f}_${p.L}_${p.V}`;const r=liga.resultados[k];
      if(!r||r.gl===''||r.gv==='')return;const gl=parseInt(r.gl),gv=parseInt(r.gv);if(isNaN(gl)||isNaN(gv))return;
      if(p.L===j&&gl>m)m=gl;if(p.V===j&&gv>m)m=gv;
    }));
    if(m>bm){bm=m;bj=j;}
  });return{j:bj,max:bm};
}
function renderInd(sm){
  const pr=calcInd(sm);
  document.getElementById('ind-con').innerHTML=pr.map(p=>`<div class="pi"><div class="pi-i">${p.i}</div><div><div class="pi-n">${p.n}</div><div class="pi-d">${p.d}</div></div><div class="pi-w">${p.g}</div></div>`).join('');
}

/* ============================================================
   FAMILIA
   ============================================================ */
function calcFamilia(sm){
  const js=liga.jugadores,wins={};
  js.forEach(a=>{wins[a]={};js.forEach(b=>{if(a!==b)wins[a][b]=0;});});
  liga.fixture.forEach(jorn=>{
    jorn.ps.forEach(p=>{
      const k=`j${jorn.f}_${p.L}_${p.V}`;const res=liga.resultados[k];
      if(!res||res.gl===''||res.gv==='')return;
      const gl=parseInt(res.gl),gv=parseInt(res.gv);if(isNaN(gl)||isNaN(gv))return;
      if(gl>gv&&wins[p.L]&&wins[p.L][p.V]!==undefined)wins[p.L][p.V]++;
      else if(gv>gl&&wins[p.V]&&wins[p.V][p.L]!==undefined)wins[p.V][p.L]++;
    });
  });
  const familia={};
  js.forEach(j=>{
    let papaScore=0,papa=null,hijoScore=0,hijo=null;
    js.forEach(rival=>{
      if(rival===j)return;
      const v=wins[rival]?.[j]||0;if(v>papaScore){papaScore=v;papa=rival;}
      const w=wins[j]?.[rival]||0;if(w>hijoScore){hijoScore=w;hijo=rival;}
    });
    familia[j]={papa:papaScore>0?papa:null,hijo:hijoScore>0?hijo:null,papaScore,hijoScore};
  });
  return familia;
}

/* ============================================================
   PERFILES
   ============================================================ */
function renderPBtns(){
  if(!liga)return;
  document.getElementById('p-btns').innerHTML=liga.jugadores.map((j,i)=>`
    <div class="pbtn" onclick="showPerfil('${j}',this)"><div class="pav">${AVS[i]||'⚽'}</div><div class="pnm">${j}</div></div>`).join('');
  document.getElementById('p-det').innerHTML='';
}

async function showPerfil(nombre,btn){
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('p-det').innerHTML='<div style="color:var(--gt);font-size:.8rem;padding:12px;">Cargando...</div>';
  const sorted=calcTabla(),sm=Object.fromEntries(sorted),order=sorted.map(([n])=>n);
  const pos=order.indexOf(nombre)+1,s=sm[nombre];if(!s)return;
  const pct=s.pj>0?Math.round(s.g/s.pj*100):0;
  const ind=calcInd(sm).filter(p=>p.g===nombre);
  const familia=calcFamilia(sm),fam=familia[nombre]||{papa:null,hijo:null};
  const av=AVS[liga.jugadores.indexOf(nombre)]||'⚽';
  const ps=[...s.partidos].sort((a,b)=>(b.gf-b.gc)-(a.gf-a.gc));
  // Trofeos de todas las ligas
  let trofeos=[];
  try{
    const{data}=await supaClient.from('ligas').select('trofeos,nombre');
    if(data)trofeos=data.flatMap(l=>(l.trofeos||[]).filter(t=>t.jugador===nombre));
  }catch(e){trofeos=(liga.trofeos||[]).filter(t=>t.jugador===nombre);}
  const trofeosComp=trofeos.filter(t=>t.tipo==='competitivo');
  const trofeosAmi=trofeos.filter(t=>t.tipo==='amistoso');
  const dineroTotal=trofeosComp.reduce((acc,t)=>acc+(t.dinero||0),0);
  // Predicciones del jugador
  const predStats=calcRankingPred().find(([n])=>n===nombre)?.[1]||{pts:0,exactos:0,ganador:0,total:0};
  const iconoT={campeon_copa:'🏆',subcamp_copa:'🥈',tercero_copa:'🥉',liga1:'🎖️'};
  const labelT={campeon_copa:'Campeón Copa',subcamp_copa:'Subcampeón',tercero_copa:'3er Puesto',liga1:'1° Liga'};
  const trofeoHTML=t=>`<div class="trofeo ${t.tipo}"><span style="font-size:1.2rem">${iconoT[t.tipo_premio]||'🏅'}</span>
    <div><div style="font-weight:700;font-size:.78rem;">${labelT[t.tipo_premio]||t.tipo_premio}</div>
    <div class="trofeo-tipo">${t.ligaNombre||''}</div>
    ${t.dinero>0?`<div class="trofeo-tipo" style="color:var(--am);">$${t.dinero}</div>`:''}</div></div>`;
  const hRow=p=>{
    const[r,cls]=p.gf>p.gc?['W','W']:p.gf<p.gc?['L','L']:['E','E'];
    return`<div class="hp"><span>vs ${p.rival}</span><span>${p.gf}–${p.gc}</span><span class="${cls}">${r}</span></div>`;
  };
  let html=`<div class="sec">${av} ${nombre}</div>
  <div class="sgrid">
    <div class="sc2"><div class="sl">Posición</div><div class="sv sn">${pos}°</div></div>
    <div class="sc2"><div class="sl">Puntos</div><div class="sv">${s.pts}</div></div>
    <div class="sc2"><div class="sl">PJ</div><div class="sv sn">${s.pj}</div></div>
    <div class="sc2"><div class="sl">% Victorias</div><div class="sv">${pct}%</div></div>
    <div class="sc2"><div class="sl">GF / GC</div><div class="sv sn" style="font-size:1.3rem">${s.gf}/${s.gc}</div></div>
    <div class="sc2"><div class="sl">G / E / P</div><div class="sv sn" style="font-size:1.3rem">${s.g}/${s.e}/${s.p}</div></div>
    <div class="sc2"><div class="sl">Predicc. pts</div><div class="sv">${predStats.pts}</div></div>
    <div class="sc2"><div class="sl">Exactos 🎯</div><div class="sv sn">${predStats.exactos}</div></div>
  </div>`;
  // Familia
  html+=`<div class="familia-box"><div class="familia-titulo">👨‍👦 ÁRBOL FAMILIAR</div>`;
  html+=fam.papa?`<div class="familia-row"><span>Papá de ${nombre}</span><span>${fam.papa} <span class="papa-tag">PAPÁ</span> (${fam.papaScore})</span></div>`
    :`<div class="familia-row"><span>Papá</span><span style="color:var(--gt);font-size:.75rem;">Sin papá aún</span></div>`;
  html+=fam.hijo?`<div class="familia-row"><span>Hijo de ${nombre}</span><span>${fam.hijo} <span class="hijo-tag">HIJO</span> (${fam.hijoScore})</span></div>`
    :`<div class="familia-row"><span>Hijo</span><span style="color:var(--gt);font-size:.75rem;">Sin hijo aún</span></div>`;
  html+=`</div>`;
  // Vitrina
  if(trofeos.length>0){
    html+=`<div class="sec">🏅 VITRINA</div>`;
    if(dineroTotal>0)html+=`<div class="plata-total"><div><div class="label">💰 PLATA GANADA (competitivos)</div></div><div class="monto">$${dineroTotal}</div></div>`;
    if(trofeosComp.length>0){
      html+=`<div style="font-family:'Bebas Neue',sans-serif;letter-spacing:1.5px;font-size:.78rem;color:var(--am);margin-bottom:6px;">💰 COMPETITIVOS</div>`;
      html+=`<div class="trofeos-wrap">${trofeosComp.map(trofeoHTML).join('')}</div>`;
    }
    if(trofeosAmi.length>0){
      html+=`<div style="font-family:'Bebas Neue',sans-serif;letter-spacing:1.5px;font-size:.78rem;color:var(--v);margin:10px 0 6px;">🎮 AMISTOSOS</div>`;
      html+=`<div class="trofeos-wrap">${trofeosAmi.map(trofeoHTML).join('')}</div>`;
    }
  }else html+=`<div class="ib" style="margin-top:10px;">Sin trofeos todavía.</div>`;
  if(ind.length){
    html+=`<div class="sec">⭐ PREMIOS INDIV.</div>`;
    ind.forEach(p=>html+=`<div class="pi"><div class="pi-i">${p.i}</div><div><div class="pi-n">${p.n}</div><div class="pi-d">${p.d}</div></div></div>`);
  }
  if(ps.length){
    html+=`<div class="sec">✅ MEJORES PARTIDOS</div>`;ps.slice(0,3).forEach(p=>html+=hRow(p));
    html+=`<div class="sec">❌ PEORES PARTIDOS</div>`;[...ps].reverse().slice(0,3).forEach(p=>html+=hRow(p));
  }else html+=`<div class="ib" style="margin-top:12px;">Sin partidos cargados.</div>`;
  document.getElementById('p-det').innerHTML=html;
}

/* ============================================================
   MODAL / NUEVA LIGA / ADMIN
   ============================================================ */
function aModal(titulo,cuerpo,onOk){
  document.getElementById('mo-t').textContent=titulo;
  document.getElementById('mo-b').innerHTML=cuerpo;
  const btn=document.getElementById('mo-ok');
  if(onOk){btn.style.display='';btn.onclick=onOk;}else btn.style.display='none';
  document.getElementById('mo').classList.add('show');
}
function cModal(e){if(e&&e.target.id!=='mo')return;document.getElementById('mo').classList.remove('show');}

function abrirNuevaLiga(){
  if(!isAdmin){toast('🔒 Necesitás ser admin');return;}
  document.getElementById('mo-t').textContent='➕ NUEVA LIGA';
  document.getElementById('mo-b').innerHTML=`
    <p>Nombre:</p><input type="text" id="nl-n" value="Liga ${idx.length+1}">
    <p>¿Tipo?</p>
    <label><input type="radio" name="tipo" value="comp" checked> 💰 Competitivo</label>
    <label><input type="radio" name="tipo" value="ami"> 🎮 Amistoso</label>
    <div id="nl-monto-wrap" style="margin-top:8px;"><p>Monto por persona ($):</p><input type="number" id="nl-m" value="1500" min="0"></div>
    <p style="margin-top:8px;">Jugadores:</p>
    <div class="jlista" id="nl-jl"></div>
    <button class="btn" onclick="addJRow()" style="width:100%;margin-bottom:7px;">+ Agregar</button>
    <label><input type="checkbox" id="nl-mix" checked> Mezclar orden al azar</label>`;
  document.getElementById('mo-ok').style.display='';
  document.getElementById('mo-ok').onclick=crearDesdeModal;
  document.getElementById('mo').classList.add('show');
  document.querySelectorAll('input[name="tipo"]').forEach(r=>{
    r.addEventListener('change',()=>{document.getElementById('nl-monto-wrap').style.display=r.value==='ami'?'none':'block';});
  });
  ['Diego','Nazario','Ezequiel','Matías'].forEach(j=>addJRow(j));
}
function addJRow(val=''){
  const lista=document.getElementById('nl-jl');if(!lista)return;
  const div=document.createElement('div');div.className='jrow';
  div.innerHTML=`<input type="text" placeholder="Nombre" value="${val}"><button class="btn" onclick="this.parentElement.remove()">✕</button>`;
  lista.appendChild(div);
}
async function crearDesdeModal(){
  if(!isAdmin)return;
  const nombre=document.getElementById('nl-n').value.trim()||`Liga ${idx.length+1}`;
  const ami=document.querySelector('input[name="tipo"]:checked')?.value==='ami';
  const monto=ami?0:parseInt(document.getElementById('nl-m')?.value)||1500;
  const mezclar=document.getElementById('nl-mix').checked;
  const js=[...document.querySelectorAll('#nl-jl input[type=text]')].map(i=>i.value.trim()).filter(Boolean);
  if(js.length<3){alert('Mínimo 3 jugadores');return;}
  if(js.length>10){alert('Máximo 10 jugadores');return;}
  cModal();
  try{await crearLigaSupabase(nombre,js,mezclar,monto,ami);toast('✓ LIGA CREADA');}
  catch(e){toast('Error: '+e.message);}
}
function abrirGestionarPins(){
  if(!isAdmin)return;
  const pins=liga.pins||{};
  const filas=liga.jugadores.map(j=>`
    <div class="pin-row">
      <span class="pin-nombre">${j}</span>
      <input type="text" maxlength="10" class="pin-inp" id="pin_${j}" placeholder="PIN" value="${pins[j]||''}">
    </div>`).join('');
  aModal('🔑 GESTIONAR PINs',`
    <p>Asigná un PIN a cada jugador. Solo ellos podrán predecir con su nombre. Mandales el PIN por privado.</p>
    <div class="pin-grid">${filas}</div>
    <p style="margin-top:4px;font-size:.7rem;">Dejá vacío si no querés PIN para ese jugador.</p>`,
    async()=>{
      const nuevos={};
      liga.jugadores.forEach(j=>{
        const v=document.getElementById('pin_'+j)?.value.trim();
        if(v)nuevos[j]=v;
      });
      liga.pins=nuevos;
      await guardarEnSupabase();
      cModal();
      renderFixture();renderPred();
      toast('✓ PINs guardados');
    });
}

function abrirRenombrar(){
  if(!isAdmin){toast('🔒 Necesitás ser admin');return;}
  aModal('✏️ RENOMBRAR',`<input type="text" id="rn-n" value="${liga.nombre}">`,async()=>{
    const n=document.getElementById('rn-n').value.trim();if(!n)return;
    liga.nombre=n;await guardarEnSupabase();
    const i=idx.find(l=>l.id===liga.id);if(i)i.nombre=n;
    poblarSel();cModal();toast('✓ GUARDADO');
  });
}
function abrirBorrar(){
  if(!isAdmin)return;
  aModal('🗑️ BORRAR LIGA',`<p>¿Seguro que querés borrar "<strong>${liga.nombre}</strong>"?</p>`,async()=>{
    await supaClient.from('ligas').delete().eq('id',liga.id);
    idx=idx.filter(l=>l.id!==liga.id);cModal();
    if(idx.length>0){poblarSel();await cambiarLiga(idx[0].id);}
    toast('✓ BORRADA');
  });
}
